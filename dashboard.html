    const CloseIcon = () => (

        <path strokeLinecap="round" strokeLinejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />

    );

    // ==========================================
    // TOAST COMPONENT
    // ==========================================
    const Toast = ({ id, type, title, message, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(() => onClose(id), 3500);
        return () => clearTimeout(timer);
      }, [id, onClose]);

      return (
        <div className="flex items-start gap-3 bg-white/95 backdrop-blur border border-slate-100 rounded-xl p-4 shadow-lg-custom ring-1 ring-black/5 animate-fade-in pointer-events-auto transition-all duration-300">
          {type === 'success' ? <CheckCircleIcon /> : <XCircleIcon />}
          <div className="flex-1 min-w-0">
            <p className="text-sm font-semibold text-slate-900">{title}</p>
            {message && <p className="text-xs text-slate-500 mt-0.5">{message}</p>}
          </div>
          <button 
            onClick={() => onClose(id)} 
            className="text-slate-400 hover:text-slate-600 transition-colors duration-150 shrink-0"
            aria-label="Dismiss notification"
          >
            <CloseIcon />
          </button>
        </div>
      );
    };

    // ==========================================
    // MODALS & DIALOGS
    // ==========================================
    const ScorecardModal = ({ isOpen, onClose }) => {
      if (!isOpen) return null;

      const criteria = [
        { name: 'Problem Statement & Depth', score: 8.5, max: 10, desc: 'Clarity of the SaaS validation and pain points identified.' },
        { name: 'Market Opportunity & TAM', score: 7.0, max: 10, desc: 'Target size assessment and GTM strategy readiness.' },
        { name: 'Technical Stack Architecture', score: 9.0, max: 10, desc: 'Modern AI architecture, database structure, and scale strategies.' },
        { name: 'Founder & Team Synergy', score: 8.0, max: 10, desc: 'Technical proficiency and domain expertise alignment.' },
      ];

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={onClose}></div>
          <div className="bg-white rounded-2xl p-6 sm:p-8 max-w-lg w-full shadow-lg-custom relative z-10 glass-card animate-fade-in border border-white/40">
            <div className="flex justify-between items-center mb-6">
              <div>
                <h3 className="text-lg font-bold text-slate-900 font-display">Stage 2 Detailed Scorecard</h3>
                <p className="text-xs text-slate-500">Evaluated by Arjun Nair & Priya Sharma</p>
              </div>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600">
                <CloseIcon />
              </button>
            </div>
            
            <div className="space-y-4 mb-6">
              {criteria.map((item, idx) => (
                <div key={idx} className="bg-slate-50/80 border border-slate-100 rounded-xl p-4">
                  <div className="flex justify-between items-center mb-1">
                    <p className="text-xs font-bold text-slate-800">{item.name}</p>
                    <span className="text-xs font-mono font-bold text-primary">{item.score} / {item.max}</span>
                  </div>
                  <p className="text-[11px] text-slate-500 leading-relaxed mb-2.5">{item.desc}</p>
                  <div className="w-full bg-slate-200/80 h-1.5 rounded-full overflow-hidden">
                    <div className="bg-gradient-to-r from-blue-500 to-purple-500 h-full rounded-full" style={{ width: `${(item.score / item.max) * 100}%` }}></div>
                  </div>
                </div>
              ))}
            </div>

            <div className="flex justify-end">
              <button 
                onClick={onClose} 
                className="px-5 py-2.5 text-xs font-bold text-white bg-primary hover:bg-primary-dark rounded-xl transition-colors duration-150"
              >
                Close Scorecard
              </button>
            </div>
          </div>

      );
    };

    const BookMentorModal = ({ isOpen, onClose, onBook }) => {
      const [date, setDate] = useState('2026-07-10');
      const [timeSlot, setTimeSlot] = useState('11:00 AM - 11:30 AM');

      if (!isOpen) return null;

      const handleSubmit = (e) => {
        e.preventDefault();
        onBook({ date, timeSlot });
        onClose();
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={onClose}></div>
          <div className="bg-white rounded-2xl p-6 sm:p-8 max-w-md w-full shadow-lg-custom relative z-10 glass-card animate-fade-in border border-white/40">
            <div className="flex justify-between items-center mb-6">
              <div>
                <h3 className="text-lg font-bold text-slate-900 font-display">Schedule Mentor Session</h3>
                <p className="text-xs text-slate-500">1:1 review call with Priya Sharma</p>
              </div>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600">
                <CloseIcon />
              </button>
            </div>
            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Available Date</label>
                <input 
                  type="date" 
                  value={date}
                  onChange={(e) => setDate(e.target.value)}
                  min="2026-07-06"
                  className="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm input-glow"
                  required
                />
              </div>
              <div>
                <label className="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Select Time Slot</label>
                <select 
                  value={timeSlot}
                  onChange={(e) => setTimeSlot(e.target.value)}
                  className="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm input-glow appearance-none"
                >

                  <option value="11:00 AM - 11:30 AM">11:00 AM - 11:30 AM</option>
                  <option value="02:30 PM - 03:00 PM">02:30 PM - 03:00 PM</option>

                  Cancel

                  type="submit" 
                  className="px-5 py-2.5 text-sm font-semibold text-white bg-primary hover:bg-primary-dark rounded-xl transition-all duration-150 shadow-md shadow-blue-500/10 hover:shadow-blue-500/20"

                </button>
              </div>
            </form>

    const InvestorRequestsModal = ({ isOpen, onClose, requests, onApprove, onDecline }) => {
      if (!isOpen) return null;

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={onClose}></div>
          <div className="bg-white rounded-2xl p-6 sm:p-8 max-w-lg w-full shadow-lg-custom relative z-10 glass-card animate-fade-in border border-white/40">
            <div className="flex justify-between items-center mb-6">
              <div>
                <h3 className="text-lg font-bold text-slate-900 font-display font-bold">Inbound Investor Requests</h3>
                <p className="text-xs text-slate-500">Review connection requests sent via Pitch QR Code scanning</p>
              </div>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600">
                <CloseIcon />
              </button>
            </div>
            
            <div className="space-y-3 max-h-[350px] overflow-y-auto no-scrollbar mb-6">
              {requests.length === 0 ? (
                <p className="text-xs text-slate-400 text-center py-6">No requests received yet.</p>
              ) : (
                requests.map((req) => (
                  <div key={req.id} className="flex justify-between items-center p-3 border border-slate-100 rounded-xl bg-slate-50/30 hover:bg-slate-50 transition-colors">
                    <div className="min-w-0">
                      <p className="text-xs font-bold text-slate-800 truncate">{req.name}</p>
                      <p className="text-[10px] text-slate-500 font-semibold truncate mt-0.5">{req.firm}</p>
                      <span className="text-[9px] text-slate-400 font-semibold mt-1 block">{req.date}</span>

                    <div className="shrink-0 flex items-center gap-1.5 pl-2">

                          >

                          <button
                            onClick={() => onDecline(req.id, req.name)}
                            className="p-1.5 text-xs font-bold text-slate-400 hover:text-slate-600 bg-slate-50 hover:bg-slate-100 border border-slate-100 rounded-lg transition-colors cursor-pointer"
                            title="Decline Connection"
                          >
                            <svg className="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>

                        <span className="px-2.5 py-1 text-[9px] font-bold text-green-600 bg-green-50 border border-green-100 rounded-full flex items-center gap-1">
                          <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="m4.5 12.75 6 6 9-13.5" /></svg>
                          Connected
                        </span>
                      )}
                    </div>
                  </div>
                ))

            </div>

            <div className="flex justify-end">
              <button 
                onClick={onClose}
                className="px-5 py-2.5 text-sm font-semibold text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-xl transition-all duration-150"
              >
                Close Portal
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // MAIN APP COMPONENT
    // ==========================================
    function App() {
      const [activePage, setActivePage] = useState('dashboard');
      const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
      const [isMobileOpen, setIsMobileOpen] = useState(false);
      const [isNotifOpen, setIsNotifOpen] = useState(false);
      const [isUserDropdownOpen, setIsUserDropdownOpen] = useState(false);
      const [toasts, setToasts] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');

      // Modals
      const [isScorecardOpen, setIsScorecardOpen] = useState(false);
      const [isBookOpen, setIsBookOpen] = useState(false);
      const [isStageModeOpen, setIsStageModeOpen] = useState(false);
      const [isRequestsOpen, setIsRequestsOpen] = useState(false);

      // Simulation upload states
      const [isUploading, setIsUploading] = useState(false);
      const [uploadProgress, setUploadProgress] = useState(0);

      // Calendar events list
      const [sessions, setSessions] = useState([
        { id: 1, mentor: 'Priya Sharma', topic: 'Product & GTM Strategy', date: '2026-07-08', time: '11:00 AM - 11:30 AM', status: 'Confirmed' }
      ]);

      // Document Vault Files
      const [files, setFiles] = useState([
        { id: 1, name: 'pitch_deck_nimbus_ai.pdf', type: 'Pitch Deck', size: '4.8 MB', date: '2026-07-04', status: 'Approved' },
        { id: 2, name: 'incorporation_certificate.pdf', type: 'Legal', size: '2.1 MB', date: '2026-07-04', status: 'Approved' },
      ]);

      // Notifications state
      const [notifications, setNotifications] = useState([
        { id: 1, type: 'success', title: 'Pitch Deck Approved', desc: 'Your uploaded Pitch Deck has been approved by the evaluation committee.', time: '1 hour ago', unread: true },
        { id: 2, type: 'primary', title: 'Mentor Assignment Complete', desc: 'Priya Sharma (GTM Mentor) is assigned to Nimbus AI.', time: '2 hours ago', unread: true },
        { id: 3, type: 'warning', title: 'Stage 2 Judging Live', desc: 'Bengaluru Zone C evaluation has entered Stage 2 review.', time: '1 day ago', unread: false },
      ]);

      const [investorRequests, setInvestorRequests] = useState([
        { id: 1, name: 'Ananya Sen', firm: 'Elevation Capital', date: 'Just now', status: 'Pending' },
        { id: 2, name: 'Michael Chang', firm: 'Matrix Partners', date: '10 mins ago', status: 'Pending' },
        { id: 3, name: 'David Miller', firm: 'Accel India', date: '2 hours ago', status: 'Approved' }
      ]);

      const unreadCount = notifications.filter(n => n.unread).length;

      // Toast helpers
      const showToast = (type, title, message) => {
        const id = Date.now().toString();
        setToasts((prev) => [...prev, { id, type, title, message }]);
      };

      const removeToast = (id) => {
        setToasts((prev) => prev.filter((t) => t.id !== id));
      };

      const handleNotifClick = (id) => {
        setNotifications((prev) =>
          prev.map((n) => (n.id === id ? { ...n, unread: false } : n))
        );
      };

                      <h4 className="font-bold text-slate-800 mb-1">When will I meet the Stage 3 panel?</h4>
                      <p>Once Stage 2 review is finalized, your advisor Priya Sharma will invite you to book a Slot on the dashboard calendars.</p>
                    </div>
                  </div>
                </div>
              )}

            </main>
          </div>

          {/* ============ NOTIFICATION CENTER DRAWER ============ */}
          {isNotifOpen && (
            <>
              <div 
                onClick={() => setIsNotifOpen(false)}
                className="fixed inset-0 bg-slate-900/35 backdrop-blur-xs z-50 transition-opacity duration-300"
              ></div>
              <aside className="fixed top-0 right-0 bottom-0 w-[400px] max-w-[90vw] bg-white shadow-lg-custom z-55 flex flex-col animate-fade-in">
                
                <div className="h-16 flex items-center justify-between px-5 border-b border-slate-100 flex-shrink-0">
                  <h3 className="font-display font-bold text-slate-800 text-base">Notifications</h3>
                  <button 
                    onClick={() => setIsNotifOpen(false)}
                    className="w-8 h-8 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-50 flex items-center justify-center transition-colors"
                  >
                    <CloseIcon />
                  </button>
                </div>

                <div className="flex-1 overflow-y-auto p-4 space-y-3">
                  {notifications.map((notif) => (
                    <div 
                      key={notif.id}
                      onClick={() => handleNotifClick(notif.id)}
                      className={`flex gap-3.5 p-3.5 rounded-xl border border-slate-100 transition-all duration-150 cursor-pointer ${
                        notif.unread ? 'bg-blue-50/70 hover:bg-blue-50/90 border-blue-50' : 'bg-white hover:bg-slate-50'
                      }`}
                    >
                      <div className={`w-9 h-9 rounded-xl flex items-center justify-center shrink-0 ${
                        notif.type === 'success' ? 'bg-green-50 text-success' :
                        notif.type === 'warning' ? 'bg-amber-50 text-warning' : 'bg-blue-50 text-primary'
                      }`}>
                        {notif.type === 'success' && (
                          <svg className="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                            <path strokeLinecap="round" strokeLinejoin="round" d="m4.5 12.75 6 6 9-13.5" />
                          </svg>
                        )}
                        {notif.type === 'warning' && (
                          <svg className="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                          </svg>
                        )}
                        {notif.type === 'primary' && (
                          <svg className="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493" />
                          </svg>
                        )}
                      </div>

                      <div className="flex-1 min-w-0">
                        <div className="flex items-center justify-between gap-2">
                          <p className="text-xs font-bold text-slate-800 truncate">{notif.title}</p>
                          {notif.unread && (
                            <span className="w-1.5 h-1.5 bg-primary rounded-full shrink-0"></span>
                          )}
                        </div>
                        <p className="text-[11px] text-slate-500 mt-1 leading-normal">{notif.desc}</p>
                        <p className="text-[9px] font-semibold text-slate-400 mt-2">{notif.time}</p>
                      </div>
                    </div>
                  ))}
                </div>

              </aside>
            </>
          )}

          {/* ============ MODAL PORTALS ============ */}
          <ScorecardModal 
            isOpen={isScorecardOpen} 
            onClose={() => setIsScorecardOpen(false)} 
          />

          <BookMentorModal 
            isOpen={isBookOpen} 
            onClose={() => setIsBookOpen(false)} 
            onBook={handleBookSession} 
          />

          <InvestorRequestsModal 
            isOpen={isRequestsOpen} 
            onClose={() => setIsRequestsOpen(false)} 
            requests={investorRequests}
            onApprove={handleApproveInvestor}
            onDecline={handleDeclineInvestor}
          />

          {/* Render Toasts */}
          {ReactDOM.createPortal(
            <div className="flex flex-col gap-3 pointer-events-none">
              {toasts.map((toast) => (
                <Toast
                  key={toast.id}
                  id={toast.id}
                  type={toast.type}
                  title={toast.title}
                  message={toast.message}
                  onClose={removeToast}
                />
              ))}
            </div>,
            document.getElementById('toast-root')
          )}

          {/* ============ STAGE PRESENTATION QR OVERLAY MODAL ============ */}
          {isStageModeOpen && (
            <div className="fixed inset-0 z-[100] bg-slate-950/98 backdrop-blur-md flex flex-col items-center justify-center p-6 text-white text-center animate-fade-in">
              
              {/* Close button */}
              <button 
                onClick={() => setIsStageModeOpen(false)}
                className="absolute top-6 right-6 p-3 rounded-full hover:bg-white/10 text-white/70 hover:text-white transition-colors cursor-pointer border border-white/10"
                title="Exit Presentation Mode"
              >
                <svg className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
              </button>

              <div className="max-w-2xl mx-auto space-y-8 flex flex-col items-center">
                {/* Heading / Info */}
                <div className="space-y-3">
                  <div className="flex items-center justify-center gap-2">
                    <span className="w-3 h-3 rounded-full bg-red-500 animate-pulse"></span>
                    <span className="text-xs font-black tracking-widest text-red-500 uppercase">Stage Pitching Live</span>
                  </div>
                  <h2 className="text-4xl font-extrabold tracking-tight font-display bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-indigo-200 to-purple-400">
                    Nimbus AI Solutions
                  </h2>
                  <p className="text-sm font-bold text-slate-400 tracking-wider uppercase">
                    AXFE26-482913 · Enterprise SaaS &amp; ML Infrastructure
                  </p>
                </div>

                {/* Massive QR Code Card */}
                <div className="bg-white p-8 rounded-3xl shadow-[0_0_50px_rgba(37,99,235,0.25)] border-4 border-blue-500 hover:scale-[1.02] transition-transform duration-300">
                  <svg viewBox="0 0 100 100" className="w-[320px] h-[320px] mx-auto text-[#0F172A]" fill="currentColor">
                    {/* Corner Squares */}
                    <rect x="10" y="10" width="22" height="22" rx="3" fill="none" stroke="#0F172A" strokeWidth="4" />
                    <rect x="16" y="16" width="10" height="10" rx="1.5" fill="#0F172A" />
                    <rect x="68" y="10" width="22" height="22" rx="3" fill="none" stroke="#0F172A" strokeWidth="4" />
                    <rect x="74" y="16" width="10" height="10" rx="1.5" fill="#0F172A" />
                    <rect x="10" y="68" width="22" height="22" rx="3" fill="none" stroke="#0F172A" strokeWidth="4" />
                    <rect x="16" y="74" width="10" height="10" rx="1.5" fill="#0F172A" />
                    
                    {/* Dummy QR Matrix */}
                    <rect x="36" y="10" width="6" height="6" rx="1" fill="#0F172A" />
                    <rect x="46" y="10" width="12" height="6" rx="1" fill="#0F172A" />
                    <rect x="36" y="20" width="6" height="12" rx="1" fill="#0F172A" />
                    <rect x="46" y="20" width="12" height="6" rx="1" fill="#0F172A" />
                    <rect x="60" y="20" width="6" height="6" rx="1" fill="#0F172A" />
                    
                    <rect x="10" y="36" width="6" height="6" rx="1" fill="#0F172A" />
                    <rect x="20" y="36" width="12" height="6" rx="1" fill="#0F172A" />
                    <rect x="36" y="36" width="6" height="6" rx="1" fill="#0F172A" />
                    <rect x="46" y="36" width="6" height="12" rx="1" fill="#0F172A" />
                    <rect x="56" y="36" width="12" height="6" rx="1" fill="#0F172A" />
                    <rect x="72" y="36" width="6" height="6" rx="1" fill="#0F172A" />
                    <rect x="82" y="36" width="8" height="6" rx="1" fill="#0F172A" />

                    <rect x="10" y="46" width="6" height="12" rx="1" fill="#0F172A" />
                    <rect x="20" y="46" width="6" height="6" rx="1" fill="#0F172A" />
                    <rect x="30" y="46" width="12" height="6" rx="1" fill="#0F172A" />
                    <rect x="46" y="52" width="6" height="6" rx="1" fill="#0F172A" />
                    <rect x="56" y="46" width="6" height="12" rx="1" fill="#0F172A" />
                    <rect x="66" y="46" width="12" height="6" rx="1" fill="#0F172A" />
                    <rect x="82" y="46" width="8" height="12" rx="1" fill="#0F172A" />

                    <rect x="36" y="68" width="6" height="12" rx="1" fill="#0F172A" />
                    <rect x="46" y="68" width="12" height="6" rx="1" fill="#0F172A" />
                    <rect x="62" y="68" width="6" height="6" rx="1" fill="#0F172A" />
                    <rect x="46" y="78" width="6" height="12" rx="1" fill="#0F172A" />
                    <rect x="56" y="78" width="12" height="6" rx="1" fill="#0F172A" />
                    <rect x="72" y="78" width="6" height="6" rx="1" fill="#0F172A" />
                    <rect x="82" y="78" width="8" height="6" rx="1" fill="#0F172A" />
                    
                    {/* Center Logo */}
                    <rect x="40" y="40" width="20" height="20" rx="5" fill="#FFFFFF" stroke="#0F172A" strokeWidth="2" />
                    <circle cx="50" cy="50" r="7" fill="#0F172A" />
                    <text x="50" y="53" fill="#FFFFFF" fontSize="9" fontWeight="bold" textAnchor="middle" fontFamily="sans-serif">N</text>
                  </svg>
                </div>

                {/* Footer instructions */}
                <div className="space-y-4">
                  <p className="text-xl font-medium text-slate-300 max-w-lg mx-auto">
                    Interested Investors: Scan this code to immediately connect with the founders and request secure pitch deck access.
                  </p>
                  <p className="text-xs text-slate-500 uppercase tracking-widest font-mono">
                    Press <span className="bg-slate-800 px-2 py-1 rounded text-slate-300">ESC</span> key or click close to exit
                  </p>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
