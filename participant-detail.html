                <div className="pb-4 mb-4 border-b border-slate-100">
                  <h3 className="text-sm font-bold text-slate-800 font-display">Evaluation Journey Timeline</h3>
                  <p className="text-[10px] text-slate-400">Chronological history of program milestones</p>
                </div>

                <div className="space-y-5">
                  {currentParticipant.timeline.map((item, idx) => (
                    <div key={idx} className="flex gap-4 relative">
                      {idx < currentParticipant.timeline.length - 1 && (
                        <div className="absolute left-2.5 top-5 bottom-[-20px] w-0.5 bg-slate-100"></div>
                      )}
                      <div className="w-5.5 h-5.5 rounded-full bg-blue-50 border border-primary text-primary flex items-center justify-center shrink-0 text-[10px] font-bold z-10">
                        {idx + 1}
                      </div>
                      <div>
                        <div className="flex items-center gap-2 flex-wrap">
                          <h4 className="text-xs font-bold text-slate-700">{item.event}</h4>
                          <span className="text-[9px] font-semibold text-slate-400">{item.date}</span>
                        </div>
                        <p className="text-[11px] text-slate-500 mt-0.5 leading-normal">{item.description}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Privacy Flags Card */}
              <div className="bg-white border border-slate-200/80 rounded-3xl p-6 shadow-sm-custom">
                <div className="pb-4 mb-4 border-b border-slate-100">
                  <h3 className="text-sm font-bold text-slate-800 font-display">Privacy &amp; Sharing Flags</h3>
                  <p className="text-[10px] text-slate-400">Configure participant data display properties</p>
                </div>

                <div className="space-y-4">
                  {/* Flag 1 */}
                  <div className="flex items-center justify-between p-2 rounded-xl hover:bg-slate-50/50 transition-colors">
                    <div>
                      <p className="text-xs font-bold text-slate-700">Share Scorecard with Investors</p>
                      <p className="text-[10px] text-slate-400 mt-0.5">Allow vetted investor accounts to pull evaluation details.</p>
                    </div>
                    <label className="relative inline-flex items-center cursor-pointer">
                      <input 
                        type="checkbox" 
                        checked={currentParticipant.privacyFlags.shareWithInvestors} 
                        onChange={() => handleToggleFlag('shareWithInvestors')}
                        className="sr-only peer switch-toggle" 
                      />
                      <div className="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
                    </label>
                  </div>

                  {/* Flag 2 */}
                  <div className="flex items-center justify-between p-2 rounded-xl hover:bg-slate-50/50 transition-colors">
                    <div>
                      <p className="text-xs font-bold text-slate-700">Anonymize Sensitive Pitch Data</p>
                      <p className="text-[10px] text-slate-400 mt-0.5">Obfuscate raw latency rates on public leaderboard views.</p>
                    </div>
                    <label className="relative inline-flex items-center cursor-pointer">
                      <input 
                        type="checkbox" 
                        checked={currentParticipant.privacyFlags.anonymizePitch} 
                        onChange={() => handleToggleFlag('anonymizePitch')}
                        className="sr-only peer switch-toggle" 
                      />
                      <div className="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
                    </label>
                  </div>

                  {/* Flag 3 */}
                  <div className="flex items-center justify-between p-2 rounded-xl hover:bg-slate-50/50 transition-colors">
                    <div>
                      <p className="text-xs font-bold text-slate-700">Enable Stage Presentation Mode</p>
                      <p className="text-[10px] text-slate-400 mt-0.5">Toggle giant QR code visibility on screens.</p>
                    </div>
                    <label className="relative inline-flex items-center cursor-pointer">
                      <input 
                        type="checkbox" 
                        checked={currentParticipant.privacyFlags.stagePresentation} 
                        onChange={() => handleToggleFlag('stagePresentation')}
                        className="sr-only peer switch-toggle" 
                      />
                      <div className="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
                    </label>
                  </div>

                  {/* Flag 4 */}
                  <div className="flex items-center justify-between p-2 rounded-xl hover:bg-slate-50/50 transition-colors">
                    <div>
                      <p className="text-xs font-bold text-slate-700">Allow Mentoring Zone Supervisor Access</p>
                      <p className="text-[10px] text-slate-400 mt-0.5">Grant write access to supervisor leads for grades validation.</p>
                    </div>
                    <label className="relative inline-flex items-center cursor-pointer">
                      <input 
                        type="checkbox" 
                        checked={currentParticipant.privacyFlags.zoneLeadAccess} 
                        onChange={() => handleToggleFlag('zoneLeadAccess')}
                        className="sr-only peer switch-toggle" 
                      />
                      <div className="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary"></div>
                    </label>
                  </div>
                </div>
              </div>

            </div>

            {/* RIGHT COLUMN: Score Cards, Remarks & History Log (7 Cols) */}
            <div className="lg:col-span-7 space-y-8">
              
              {/* Score Cards Card */}
              <div className="bg-white border border-slate-200/80 rounded-3xl p-6 shadow-sm-custom">
                <div className="pb-4 mb-6 border-b border-slate-100 flex justify-between items-center flex-wrap gap-3">
                  <div>
                    <h3 className="text-sm font-bold text-slate-800 font-display">Rubrics &amp; Scorecard Metrics</h3>
                    <p className="text-[10px] text-slate-400">Current scores weighted average performance</p>
                  </div>
                  <div className="text-right bg-slate-50 border border-slate-100 rounded-xl px-4 py-2 shrink-0">
                    <span className="text-[9px] font-bold text-slate-400 uppercase tracking-wider block">Weighted Average Score</span>
                    <span className="text-lg font-extrabold text-primary font-display mt-0.5">
                      {currentParticipant.score !== null ? `${currentParticipant.score.toFixed(1)} / 10.0` : 'Pending'}
                    </span>
                  </div>
                </div>

                <div className="space-y-5">
                  {/* Score 1 */}
                  <div>
                    <div className="flex justify-between text-xs font-bold text-slate-600 mb-1.5">
                      <span>Value Proposition &amp; Product Definition (Weight: 20%)</span>
                      <span className="text-primary font-mono">{currentParticipant.scores.valueProp} / 10</span>
                    </div>
                    <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                      <div className="bg-primary h-full transition-all duration-300" style={{ width: `${currentParticipant.scores.valueProp * 10}%` }}></div>
                    </div>
                  </div>

                  {/* Score 2 */}
                  <div>
                    <div className="flex justify-between text-xs font-bold text-slate-600 mb-1.5">
                      <span>Go-To-Market &amp; Customer Acquisition Sales Cycles (Weight: 20%)</span>
                      <span className="text-primary font-mono">{currentParticipant.scores.gtm} / 10</span>
                    </div>
                    <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                      <div className="bg-primary h-full transition-all duration-300" style={{ width: `${currentParticipant.scores.gtm * 10}%` }}></div>
                    </div>
                  </div>

                  {/* Score 3 */}
                  <div>
                    <div className="flex justify-between text-xs font-bold text-slate-600 mb-1.5">
                      <span>Co-Founder Synergy &amp; Management Capability (Weight: 20%)</span>
                      <span className="text-primary font-mono">{currentParticipant.scores.team} / 10</span>
                    </div>
                    <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                      <div className="bg-primary h-full transition-all duration-300" style={{ width: `${currentParticipant.scores.team * 10}%` }}></div>
                    </div>
                  </div>

                  {/* Score 4 */}
                  <div>
                    <div className="flex justify-between text-xs font-bold text-slate-600 mb-1.5">
                      <span>Technical Architecture &amp; Database Viability (Weight: 20%)</span>
                      <span className="text-primary font-mono">{currentParticipant.scores.tech} / 10</span>
                    </div>
                    <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                      <div className="bg-primary h-full transition-all duration-300" style={{ width: `${currentParticipant.scores.tech * 10}%` }}></div>
                    </div>
                  </div>

                  {/* Score 5 */}
                  <div>
                    <div className="flex justify-between text-xs font-bold text-slate-600 mb-1.5">
                      <span>Financial Plan, Cash Runway &amp; Cap Efficiency (Weight: 20%)</span>
                      <span className="text-primary font-mono">{currentParticipant.scores.finance} / 10</span>
                    </div>
                    <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                      <div className="bg-primary h-full transition-all duration-300" style={{ width: `${currentParticipant.scores.finance * 10}%` }}></div>
                    </div>
                  </div>
                </div>
              </div>

              {/* Remarks & Recommendations Card */}
              <div className="bg-white border border-slate-200/80 rounded-3xl p-6 shadow-sm-custom">
                <div className="pb-4 mb-4 border-b border-slate-100">
                  <h3 className="text-sm font-bold text-slate-800 font-display">Remarks &amp; Recommendations</h3>
                  <p className="text-[10px] text-slate-400">Written feedback from evaluations leads &amp; mentors</p>
                </div>

                {/* Remarks List */}
                <div className="space-y-4 mb-6">
                  {currentParticipant.remarks.length === 0 ? (
                    <p className="text-xs text-slate-400 text-center py-4">No remarks recorded yet.</p>
                  ) : (
                    currentParticipant.remarks.map((rem, idx) => (
                      <div key={idx} className="p-4 border border-slate-100 rounded-2xl bg-slate-50/50">
                        <div className="flex justify-between text-xs mb-1.5">
                          <span className="font-bold text-slate-800">{rem.author}</span>
                          <span className="text-[10px] font-bold text-primary bg-blue-50 px-2 py-0.5 rounded-full">{rem.role}</span>
                        </div>
                        <p className="text-xs text-slate-600 leading-relaxed italic">"{rem.text}"</p>
                      </div>
                    ))
                  )}
                </div>

                {/* Add Remark Form */}
                <form onSubmit={handleAddRemark} className="space-y-3.5 pt-4 border-t border-slate-100">
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Author Identity</label>
                      <select 
                        value={remarkAuthor} 
                        onChange={(e) => setRemarkAuthor(e.target.value)}
                        className="w-full border border-slate-200 rounded-xl px-3 py-2 text-xs bg-white font-semibold"
                      >
                        <option value="Admin">Admin (System)</option>
                        <option value="Priya Sharma">Priya Sharma (GTM)</option>
                        <option value="Arjun Nair">Arjun Nair (Tech)</option>
                      </select>
                    </div>
                  </div>
                  <div>
                    <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Leave Remarks/Recommendations</label>
                    <textarea 
                      placeholder="Add specific recommendations or checklist concerns..." 
                      rows="3"
                      value={remarksText}
                      onChange={(e) => setRemarksText(e.target.value)}
                      className="w-full border border-slate-200 rounded-xl p-3 text-xs focus:outline-none focus:ring-2 focus:ring-primary/20"
                      required
                    ></textarea>
                  </div>
                  <div className="flex justify-end">
                    <button 
                      type="submit"
                      className="px-4 py-2 text-xs font-bold text-white bg-slate-900 hover:bg-slate-800 rounded-xl transition-colors cursor-pointer"
                    >
                      Post Remark
                    </button>
                  </div>
                </form>
              </div>

              {/* Assessment History Log Card */}
              <div className="bg-white border border-slate-200/80 rounded-3xl p-6 shadow-sm-custom">
                <div className="pb-4 mb-4 border-b border-slate-100">
                  <h3 className="text-sm font-bold text-slate-800 font-display">Assessment History Log</h3>
                  <p className="text-[10px] text-slate-400">System audit history tracking changes</p>
                </div>

                <div className="space-y-3.5">
                  {currentParticipant.history.map((h, idx) => (
                    <div key={idx} className="flex justify-between items-start gap-4 text-xs py-2 border-b border-slate-50 last:border-0">
                      <div>
                        <div className="flex items-center gap-1.5 flex-wrap">
                          <span className="font-bold text-slate-700">{h.action}</span>
                          <span className="text-[10px] text-slate-400 font-semibold">by {h.user}</span>
                        </div>
                        <p className="text-[11px] text-slate-500 mt-0.5 leading-normal">{h.details}</p>
                      </div>
                      <span className="text-[9px] font-bold text-slate-400 text-right whitespace-nowrap shrink-0">{h.timestamp}</span>
                    </div>
                  ))}
                </div>
              </div>

            </div>
          </main>

          {/* Render Toasts */}
          <div className="fixed bottom-4 right-4 z-50 flex flex-col gap-3 pointer-events-none">
            {toasts.map(toast => (
              <Toast key={toast.id} {...toast} onClose={removeToast} />
            ))}
          </div>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
