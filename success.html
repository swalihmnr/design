<!doctype html>
<html lang="en" class="h-full">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registration Successful — AX Founder Exchange 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: { axnavy:'#0F1A4D', axblue:'#3B5BFF', axviolet:'#7C3AED', axlavender:'#EEF1FF', axpaper:'#F7F8FC', axink:'#0F172A', axslate:'#64748B', axline:'#E2E6F3' },
    fontFamily: { display:['Space Grotesk','sans-serif'], sans:['Inter','sans-serif'], mono:['JetBrains Mono','monospace'] },
    borderRadius: { xl2:'1.25rem' }
  } } }
</script>
<link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="min-h-screen bg-axpaper bg-paper-dots font-sans text-axink antialiased">
<div id="toast-region" aria-live="polite"></div>

<main class="min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-lg">

    <div class="card p-8 sm:p-10 text-center">
      <!-- Success icon inside the evaluation-dial ring -->
      <div class="relative w-24 h-24 mx-auto mb-6">
        <svg viewBox="0 0 96 96" class="w-24 h-24">
          <circle cx="48" cy="48" r="42" fill="var(--axsuccess-bg)"/>
          <circle cx="48" cy="48" r="42" fill="none" stroke="var(--axsuccess)" stroke-width="3" stroke-dasharray="264" stroke-dashoffset="0" class="eval-dial-static"/>
        </svg>
        <svg class="absolute inset-0 m-auto w-11 h-11" style="color:var(--axsuccess)" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5"/>
        </svg>
      </div>

      <h1 class="font-display text-2xl sm:text-3xl font-semibold mb-2">Registration successful</h1>
      <p class="text-sm text-axslate mb-8">Your submission is in — our evaluation team will review it and match you with mentors shortly.</p>

      <!-- QR + participant ID -->
      <div class="flex flex-col sm:flex-row items-center gap-6 bg-axlavender rounded-xl2 p-5 mb-6 text-left">
        <div class="relative w-32 h-32 shrink-0 mx-auto sm:mx-0">
          <svg viewBox="0 0 128 128" class="eval-dial w-32 h-32">
            <circle cx="64" cy="64" r="58" fill="#fff" stroke="url(#dg2)" stroke-width="4"/>
            <defs><linearGradient id="dg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3B5BFF"/><stop offset="1" stop-color="#7C3AED"/></linearGradient></defs>
          </svg>
          <img id="qr-image" src="" alt="QR code for participant check-in" class="absolute inset-0 m-auto w-24 h-24 rounded-lg" style="transform:rotate(90deg)">
        </div>
        <div class="flex-1 w-full">
          <dl class="space-y-3 text-sm">
            <div class="flex items-center justify-between">
              <dt class="text-axslate">Participant ID</dt>
              <dd class="font-mono font-semibold" id="participant-id">—</dd>
            </div>
            <div class="flex items-center justify-between">
              <dt class="text-axslate">Registration date</dt>
              <dd class="font-medium" id="reg-date">—</dd>
            </div>
            <div class="flex items-center justify-between">
              <dt class="text-axslate">Current status</dt>
              <dd><span class="badge badge-warning">Under review</span></dd>
            </div>
          </dl>
        </div>
      </div>

      <div class="grid sm:grid-cols-2 gap-3 mb-3">
        <button type="button" id="download-qr" class="btn btn-secondary">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-6 4.5 4.5m0 0 4.5-4.5m-4.5 4.5V3"/></svg>
          Download QR code
        </button>
        <button type="button" id="download-receipt" class="btn btn-secondary">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 3.75h6M5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V7.5l-6-6H5.25A2.25 2.25 0 0 0 3 3.75v15A2.25 2.25 0 0 0 5.25 21Z"/></svg>
          Download receipt
        </button>
      </div>
      <a href="dashboard.html" class="btn btn-primary w-full">
        Go to dashboard
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/></svg>
      </a>
    </div>

    <p class="text-center text-xs text-axslate mt-6">A confirmation email with these details has been sent to your inbox.</p>
  </div>
</main>

<script src="assets/js/main.js"></script>
<script>
  const participantId = 'AXFE26-' + Math.floor(100000 + Math.random() * 900000);
  document.getElementById('participant-id').textContent = participantId;
  document.getElementById('reg-date').textContent = new Date().toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
  document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=0&data=${encodeURIComponent(participantId)}`;

  document.getElementById('download-qr').addEventListener('click', () => {
    const a = document.createElement('a');
    a.href = document.getElementById('qr-image').src;
    a.download = `${participantId}-qr.png`;
    a.target = '_blank';
    a.click();
    toast({ title: 'QR code download started', type: 'success' });
  });
  document.getElementById('download-receipt').addEventListener('click', () => {
    toast({ title: 'Receipt download started', message: `${participantId}-receipt.pdf`, type: 'success' });
  });
</script>
</body>
</html>
