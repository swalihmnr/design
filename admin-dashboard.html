<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — AX Founder Exchange 2026</title>
  <meta name="description" content="Admin evaluation and zone management portal for organizers of the AX Founder Exchange 2026." />
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563EB',
            secondary: '#7C3AED',
            success: '#16A34A',
            warning: '#F59E0B',
            danger: '#DC2626',
            axnavy: '#0F1A4D',
            axblue: '#3B5BFF',
            axviolet: '#7C3AED',
            axlavender: '#EEF1FF',
            axpaper: '#F7F8FC',
            axink: '#0F172A',
            axslate: '#64748B',
            axline: '#E2E6F3'
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
          },
          boxShadow: {
            'sm-custom': '0 1px 2px rgba(17,24,39,0.05)',
            'md-custom': '0 4px 12px -2px rgba(17,24,39,0.08), 0 2px 4px rgba(17,24,39,0.04)',
            'lg-custom': '0 16px 32px -8px rgba(17,24,39,0.14), 0 4px 8px rgba(17,24,39,0.05)',
          }
        }
      }
    }
  </script>
  
  <!-- React & Babel CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .input-glow:focus {
      outline: none;
      border-color: #2563EB;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.1);
    }
  </style>
</head>
<body class="h-full bg-slate-50 text-slate-800">
  <div id="root"></div>

  <!-- Toast Root -->
  <div id="toast-root" class="fixed bottom-4 right-4 z-50 flex flex-col gap-3 pointer-events-none"></div>

  <script type="text/babel">
    console.log("Admin Dashboard React App initializing...");
    const { useState, useEffect } = React;

    // ==========================================
    // SHARED UTILITY COMPONENTS
    // ==========================================
    const Toast = ({ id, type, title, message, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(() => onClose(id), 4000);
        return () => clearTimeout(timer);
      }, [id, onClose]);

      const colors = {
        success: 'border-green-500 bg-green-50 text-green-800',
        danger: 'border-red-500 bg-red-50 text-red-800',
        warning: 'border-amber-500 bg-amber-50 text-amber-800',
        info: 'border-blue-500 bg-blue-50 text-blue-800',
      };

      return (
        <div className={`p-4 rounded-xl border shadow-md flex gap-3 max-w-sm pointer-events-auto animate-fade-in ${colors[type]}`}>
          <div className="flex-1">
            <p className="text-xs font-bold font-display">{title}</p>
            <p className="text-[11px] font-medium mt-0.5 leading-normal opacity-90">{message}</p>
          </div>
          <button onClick={() => onClose(id)} className="text-slate-400 hover:text-slate-600 self-start">
            <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18 18 6M6 6l12 12" /></svg>
          </button>
        </div>
      );
    };

    // ==========================================
    // DIALOG MODALS
    // ==========================================
    const PromoteModal = ({ isOpen, onClose, participant, onConfirm }) => {
      if (!isOpen || !participant) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={onClose}></div>
          <div className="bg-white rounded-2xl p-6 sm:p-8 max-w-md w-full shadow-lg-custom relative z-10 animate-fade-in border border-slate-100">
            <h3 className="text-base font-bold text-slate-900 font-display">Manage Final Shortlist</h3>
            <p className="text-xs text-slate-500 mt-1">
              Toggle final selection status for <strong>{participant.name}</strong>.
            </p>
            <div className="my-5 p-3.5 bg-slate-50 border border-slate-100 rounded-xl space-y-2">
              <div className="flex justify-between text-xs">
                <span className="font-semibold text-slate-500">Startup Code</span>
                <span className="font-mono font-bold text-slate-800">{participant.code}</span>
              </div>
              <div className="flex justify-between text-xs">
                <span className="font-semibold text-slate-500">Zone Track</span>
                <span className="font-bold text-slate-800">{participant.zone} · {participant.track}</span>
              </div>
              <div className="flex justify-between text-xs">
                <span className="font-semibold text-slate-500">Scorecard Grade</span>
                <span className="font-mono font-bold text-primary">{participant.score} / 10</span>
              </div>
            </div>
            <div className="flex gap-3 justify-end">
              <button onClick={onClose} className="px-4 py-2.5 text-xs font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-xl">
                Cancel
              </button>
              <button 
                onClick={() => { onConfirm(participant.id); onClose(); }} 
                className={`px-5 py-2.5 text-xs font-bold text-white rounded-xl shadow-md ${
                  participant.shortlisted ? 'bg-red-600 hover:bg-red-700' : 'bg-success hover:bg-success-dark'
                }`}
              >
                {participant.shortlisted ? 'Remove from Shortlist' : 'Promote to Shortlist'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // MAIN APP COMPONENT
    // ==========================================
    function App() {
      const [activePage, setActivePage] = useState('home');
      const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
      const [isMobileOpen, setIsMobileOpen] = useState(false);
      const [toasts, setToasts] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [zoneFilter, setZoneFilter] = useState('All');

      // Promote modal state
      const [selectedParticipant, setSelectedParticipant] = useState(null);
      const [isPromoteOpen, setIsPromoteOpen] = useState(false);

      // Report generation state
      const [isGenerating, setIsGenerating] = useState(false);

      // Mock Data
      const [participants, setParticipants] = useState([
        { id: 1, name: 'Nimbus AI Solutions', code: 'AXFE26-482913', zone: 'Zone C', track: 'SaaS & AI', score: 8.5, progress: 65, status: 'Active Review', shortlisted: true },
        { id: 2, name: 'Apex Robotics Labs', code: 'AXFE26-102948', zone: 'Zone A', track: 'DeepTech', score: 7.4, progress: 100, status: 'Evaluated', shortlisted: false },
        { id: 3, name: 'MediQuick Care', code: 'AXFE26-883921', zone: 'Zone B', track: 'HealthTech', score: 8.9, progress: 80, status: 'Active Review', shortlisted: true },
        { id: 4, name: 'FinFlow Pay', code: 'AXFE26-726481', zone: 'Zone C', track: 'FinTech', score: 6.8, progress: 50, status: 'Drafting', shortlisted: false },
        { id: 5, name: 'Zetta AgriTech Systems', code: 'AXFE26-339281', zone: 'Zone D', track: 'Agritech', score: 8.2, progress: 75, status: 'Active Review', shortlisted: true },
        { id: 6, name: 'Optima Logi Solutions', code: 'AXFE26-554812', zone: 'Zone A', track: 'Logistic AI', score: 7.9, progress: 100, status: 'Evaluated', shortlisted: false }
      ]);

      const [alerts, setAlerts] = useState([
        { id: 1, type: 'danger', message: 'Stage 2 Judging review pending for Zone C FinTech track.', time: '10 mins ago', actionLabel: 'Review Track' },
        { id: 2, type: 'warning', message: 'Evaluation grade mismatch detected for FinFlow Pay.', time: '1 hour ago', actionLabel: 'Resolve Grade' },
        { id: 3, type: 'info', message: 'Nimbus AI uploaded Pitch Deck updates in Document Vault.', time: '2 hours ago', actionLabel: 'View Deck' }
      ]);

      const [activities, setActivities] = useState([
        { id: 1, text: 'Rajesh Varma updated evaluations for Nimbus AI Solutions in Zone C.', time: '5 mins ago' },
        { id: 2, text: 'Zetta AgriTech Solutions added to the Final Shortlist.', time: '1 hour ago' },
        { id: 3, text: 'Arjun Nair signed off evaluations for Zone A DeepTech track.', time: '4 hours ago' },
        { id: 4, text: 'Priya Sharma assigned calendar sync logs for Zone B.', time: '1 day ago' }
      ]);

      // User Management States
      const [usersList, setUsersList] = useState([
        { id: "USR-001", name: "Sarah Connor", email: "sarah@axfe26.org", role: "admin", track: "All", zone: "Zone A" },
        { id: "USR-002", name: "David Miller", email: "david@axfe26.org", role: "mentor", track: "SaaS & AI", zone: "Zone C" },
        { id: "USR-003", name: "Elena Rostova", email: "elena@axfe26.org", role: "judge", track: "All", zone: "Main Stage" },
        { id: "USR-004", name: "Marcus Aurelius", email: "marcus@axfe26.org", role: "volunteer", track: "Gate 1", zone: "Zone B" },
        { id: "USR-005", name: "Aditi Sharma", email: "aditi@nimbusai.io", role: "participant", track: "SaaS & AI", zone: "Zone C" }
      ]);
      const [newUser, setNewUser] = useState({ name: '', email: '', role: 'mentor', track: '', zone: 'Zone A' });

      // Startup Management States
      const [startupList, setStartupList] = useState([
        { id: "AXFE26-482913", name: "Nimbus AI Solutions", founder: "Aditi Sharma", track: "SaaS & AI", status: "Approved", documents: { pitchDeck: true, pitchVideo: true, techPlan: true } },
        { id: "AXFE26-726481", name: "FinFlow Pay", founder: "Rajesh Verma", track: "FinTech", status: "Under Review", documents: { pitchDeck: true, pitchVideo: false, techPlan: true } },
        { id: "AXFE26-339281", name: "Zetta AgriTech Systems", founder: "Amit Patel", track: "Agritech", status: "Approved", documents: { pitchDeck: true, pitchVideo: true, techPlan: false } },
        { id: "AXFE26-102948", name: "Apex Robotics Labs", founder: "Vikram Malhotra", track: "DeepTech", status: "Approved", documents: { pitchDeck: false, pitchVideo: false, techPlan: true } },
        { id: "AXFE26-883921", name: "MediQuick Care", founder: "Dr. Shalini Mukherji", track: "HealthTech", status: "Under Review", documents: { pitchDeck: true, pitchVideo: true, techPlan: true } },
        { id: "AXFE26-554812", name: "Optima Logi Solutions", founder: "Karan Johar", track: "Logistic AI", status: "Approved", documents: { pitchDeck: true, pitchVideo: false, techPlan: false } }
      ]);

      // Permission States
      const [permissions, setPermissions] = useState({
        admin: { editScores: true, viewAnalytics: true, approveCheckin: true, printBadges: true },
        mentor: { editScores: true, viewAnalytics: false, approveCheckin: false, printBadges: false },
        judge: { editScores: true, viewAnalytics: false, approveCheckin: false, printBadges: false },
        volunteer: { editScores: false, viewAnalytics: false, approveCheckin: true, printBadges: true },
        participant: { editScores: false, viewAnalytics: false, approveCheckin: false, printBadges: false }
      });

      // Event Monitoring States
      const [sysAlertCount, setSysAlertCount] = useState(0);
      const [wsConnections, setWsConnections] = useState(14);
      const [activeSessions, setActiveSessions] = useState(5);
      const [pitchQueuePosition, setPitchQueuePosition] = useState(3); // MediQuick is pitching

      const zones = [
        { id: 'Zone A', name: 'Zone A · DeepTech', lead: 'Arjun Nair', progress: 100, count: 2, status: 'Completed' },
        { id: 'Zone B', name: 'Zone B · HealthTech', lead: 'Priya Sharma', progress: 80, count: 1, status: 'Active' },
        { id: 'Zone C', name: 'Zone C · SaaS & AI', lead: 'Rajesh Varma', progress: 58, count: 2, status: 'Active' },
        { id: 'Zone D', name: 'Zone D · Agritech', lead: 'Meera Sen', progress: 75, count: 1, status: 'Active' }
      ];

      // Toast helpers
      const showToast = (type, title, message) => {
        const id = Date.now().toString();
        setToasts((prev) => [...prev, { id, type, title, message }]);
      };

      const removeToast = (id) => {
        setToasts((prev) => prev.filter((t) => t.id !== id));
      };

      // Promote action
      const handleToggleShortlist = (id) => {
        setParticipants(prev => prev.map(p => {
          if (p.id === id) {
            const updated = !p.shortlisted;
            showToast('success', updated ? 'Added to Shortlist' : 'Removed from Shortlist', `${p.name} status updated.`);
            return { ...p, shortlisted: updated };
          }
          return p;
        }));
      };

      // Dismiss Alert
      const handleDismissAlert = (id) => {
        setAlerts(prev => prev.filter(a => a.id !== id));
        showToast('info', 'Alert Dismissed', 'The alert has been removed from your feed.');
      };

      // Trigger Export Simulation
      const handleExportCSV = () => {
        setIsGenerating(true);
        setTimeout(() => {
          setIsGenerating(false);
          showToast('success', 'Report Exported', 'Evaluation database downloaded successfully as CSV.');
        }, 1500);
      };

      const handleLogout = (e) => {
        e.preventDefault();
        showToast('success', 'Logging Out', 'Closing session...');
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1000);
      };

      // User Management Handlers
      const handleAddUser = (e) => {
        e.preventDefault();
        if (!newUser.name || !newUser.email) {
          showToast('error', 'Fields Required', 'Please fill name and email.');
          return;
        }
        const id = `USR-0${usersList.length + 1}`;
        setUsersList([...usersList, { ...newUser, id }]);
        setNewUser({ name: '', email: '', role: 'mentor', track: newUser.track || 'All', zone: newUser.zone || 'Zone A' });
        showToast('success', 'User Registered', `Successfully added ${newUser.name} as a ${newUser.role}.`);
      };

      const handleDeleteUser = (id) => {
        setUsersList(usersList.filter(u => u.id !== id));
        showToast('info', 'User Removed', 'Platform user deleted successfully.');
      };

      // Startup Management Handlers
      const handleUpdateStartupStatus = (id, newStatus) => {
        setStartupList(startupList.map(s => s.id === id ? { ...s, status: newStatus } : s));
        showToast('success', 'Status Updated', `Startup status changed to ${newStatus}.`);
      };

      const handleToggleDoc = (id, docType) => {
        setStartupList(startupList.map(s => {
          if (s.id === id) {
            return {
              ...s,
              documents: { ...s.documents, [docType]: !s.documents[docType] }
            };
          }
          return s;
        }));
        showToast('info', 'Document Verification', 'Toggled document verification checkmark.');
      };

      // Permissions Handler
      const handleTogglePermission = (role, key) => {
        setPermissions(prev => ({
          ...prev,
          [role]: {
            ...prev[role],
            [key]: !prev[role][key]
          }
        }));
        showToast('info', 'Permissions Updated', `Toggled ${key} permission for role ${role}.`);
      };

      // Live Simulator Handlers
      const triggerSimulatedAlert = () => {
        const newId = alerts.length + 1;
        const newAlert = {
          id: newId,
          type: 'warning',
          message: `Simulated System Alert #${newId}: Memory threshold warning on Stage Server.`,
          time: 'Just now',
          actionLabel: 'Acknowledge'
        };
        setAlerts([newAlert, ...alerts]);
        showToast('warning', 'Alert Triggered', 'New system alert simulated.');
      };

      const handleAssessmentScoreChange = (id, rubric, value) => {
        setParticipants(prev => prev.map(p => {
          if (p.code === id) {
            const updatedScore = parseFloat(value);
            return { ...p, score: updatedScore };
          }
          return p;
        }));
        showToast('success', 'Scores Updated', `Successfully updated score for ${id}.`);
      };

      // Computed statistics
      const totalParticipants = participants.length;
      const averageProgress = Math.round(participants.reduce((sum, p) => sum + p.progress, 0) / totalParticipants);
      const shortlistedCount = participants.filter(p => p.shortlisted).length;

      // Dynamic check-in metrics
      const volunteerAttendance = localStorage.getItem('axfe26_volunteer_attendance');
      const attendanceList = volunteerAttendance ? JSON.parse(volunteerAttendance) : [];
      const checkedInCount = attendanceList.length > 0 ? attendanceList.filter(a => a.checkedIn).length : 2;
      const pendingCheckInCount = totalParticipants - checkedInCount;

      // Filtered participants
      const filteredParticipants = participants.filter(p => {
        const matchesSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.code.toLowerCase().includes(searchQuery.toLowerCase());
        const matchesZone = zoneFilter === 'All' || p.zone === zoneFilter;
        return matchesSearch && matchesZone;
      });

      return (
        <div className="min-h-screen flex bg-slate-50 relative overflow-x-hidden">
          
          {/* Sidebar */}
          <aside className={`fixed top-0 bottom-0 left-0 z-50 bg-white border-r border-slate-200/80 flex flex-col transition-all duration-300 ${
            isSidebarCollapsed ? 'w-[76px]' : 'w-[264px]'
          } ${isMobileOpen ? 'translate-x-0' : '-translate-x-full lg:translate-x-0'}`}>
            
            {/* Sidebar Logo */}
            <div className="h-16 flex items-center gap-3 px-5 border-b border-slate-100 flex-shrink-0">
              <div className="w-8 h-8 rounded-lg bg-indigo-950 flex items-center justify-center flex-shrink-0 shadow-md">
                <svg className="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M12 21a9.004 9.004 0 0 0 8.716-6.747M12 21a9.004 9.004 0 0 1-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 0 1 7.843 4.582M12 3a8.997 8.997 0 0 0-7.843 4.582m15.686 0A11.953 11.953 0 0 1 12 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0 1 21 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0 1 12 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 0 1 3 12c0-.778.099-1.533.284-2.253" />
                </svg>
              </div>
              {!isSidebarCollapsed && (
                <div className="min-w-0 overflow-hidden">
                  <p className="font-bold text-sm text-slate-800 tracking-tight leading-tight">AX Admin Console</p>
                  <p className="text-[10px] font-semibold text-indigo-500 uppercase tracking-wider mt-0.5">AXFE26 Evaluator</p>
                </div>
              )}
            </div>

            {/* Sidebar Nav */}
            <nav className="flex-1 overflow-y-auto no-scrollbar p-3 space-y-4">
              
              {/* Section 1: Overview */}
              <div>
                {!isSidebarCollapsed && (
                  <p className="text-[10px] font-bold uppercase tracking-wider text-slate-400 px-3 mb-2 font-display">Overview</p>
                )}
                <div className="space-y-0.5">
                  <button 
                    onClick={() => { setActivePage('home'); setIsMobileOpen(false); }}
                    className={`w-full flex items-center gap-3.5 px-3 py-2.5 rounded-xl text-xs font-bold transition-all ${
                      activePage === 'home' 
                        ? 'bg-indigo-50 text-indigo-700' 
                        : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50'
                    }`}
                  >
                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
                    {!isSidebarCollapsed && 'Dashboard Home'}
                  </button>
                </div>
              </div>

              {/* Section 2: Operations */}
              <div>
                {!isSidebarCollapsed && (
                  <p className="text-[10px] font-bold uppercase tracking-wider text-slate-400 px-3 mb-2 font-display">Event Operations</p>
                )}
                <div className="space-y-0.5">
                  <button 
                    onClick={() => { setActivePage('roster'); setIsMobileOpen(false); }}
                    className={`w-full flex items-center gap-3.5 px-3 py-2.5 rounded-xl text-xs font-bold transition-all ${
                      activePage === 'roster' 
                        ? 'bg-indigo-50 text-indigo-700' 
                        : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50'
                    }`}
                  >
                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M18 18.72a9.094 9.094 0 0 0 3.741-.479 3 3 0 0 0-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0 1 12 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 0 1 6 18.719m12 0a5.971 5.971 0 0 0-.941-3.197m0 0A5.995 5.995 0 0 0 12 12.75a5.995 5.995 0 0 0-5.058 2.772m0 0a3 3 0 0 0-4.681 2.72 8.986 8.986 0 0 0 3.74.477m.94-3.197a5.971 5.971 0 0 0-.94 3.197M15 6.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm6 3a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Zm-13.5 0a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Z" /></svg>
                    {!isSidebarCollapsed && 'Participants Roster'}
                  </button>

                  <button 
                    onClick={() => { setActivePage('zones'); setIsMobileOpen(false); }}
                    className={`w-full flex items-center gap-3.5 px-3 py-2.5 rounded-xl text-xs font-bold transition-all ${
                      activePage === 'zones' 
                        ? 'bg-indigo-50 text-indigo-700' 
                        : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50'
                    }`}
                  >
                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/><path strokeLinecap="round" strokeLinejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z"/></svg>
                    {!isSidebarCollapsed && 'Zone Status'}
                  </button>

                </div>
              )}

              {/* PAGE 8: Assessment Management */}
              {activePage === 'assessments' && (
                <div className="space-y-6 animate-fade-in">
                  <div className="bg-white border border-slate-200/80 rounded-2xl p-6 sm:p-8 shadow-sm-custom">
                    <div className="pb-4 mb-6 border-b border-slate-100">
                      <h3 className="text-base font-bold text-slate-800 font-display">Assessment Score Reconciliation</h3>
                      <p className="text-xs text-slate-400">Review and tweak Initial Pitch Scores, Mentor Ratings, and Stage Judge Grades.</p>
                    </div>

                    <div className="overflow-x-auto rounded-xl border border-slate-200/80">
                      <table className="w-full text-left border-collapse">
                        <thead>
                          <tr className="bg-slate-50/50 border-b border-slate-200/60">
                            <th className="p-4 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Startup Company</th>
                            <th className="p-4 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Startup ID</th>
                            <th className="p-4 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Initial Rubrics</th>
                            <th className="p-4 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Mentor Grade</th>
                            <th className="p-4 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Judge Score</th>
                            <th className="p-4 text-[10px] font-bold text-slate-400 uppercase tracking-wider">Unified Grade</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100 text-xs">
                          {participants.map((p) => (
                            <tr key={p.id} className="hover:bg-slate-50/30">
                              <td className="p-4 font-bold text-slate-800">{p.name}</td>
                              <td className="p-4 font-mono text-slate-500 font-semibold">{p.code}</td>
                              <td className="p-4">
                                <div className="flex items-center gap-2">
                                  <input 
                                    type="number" step="0.1" min="1" max="10"
                                    defaultValue={p.score - 0.2}
                                    onChange={(e) => handleAssessmentScoreChange(p.code, 'initial', e.target.value)}
                                    className="w-16 border border-slate-200 rounded-lg px-2 py-1 text-center font-bold bg-slate-50/50"
                                  />
                                  <span className="text-[10px] text-slate-400">/ 10</span>
                                </div>
                              </td>
                              <td className="p-4">
                                <div className="flex items-center gap-2">
                                  <input 
                                    type="number" step="0.1" min="1" max="10"
                                    defaultValue={p.score}
                                    onChange={(e) => handleAssessmentScoreChange(p.code, 'mentor', e.target.value)}
                                    className="w-16 border border-slate-200 rounded-lg px-2 py-1 text-center font-bold bg-slate-50/50"
                                  />
                                  <span className="text-[10px] text-slate-400">/ 10</span>
                                </div>
                              </td>
                              <td className="p-4">
                                <div className="flex items-center gap-2">
                                  <input 
                                    type="number" step="0.1" min="1" max="10"
                                    defaultValue={p.score + 0.1}
                                    onChange={(e) => handleAssessmentScoreChange(p.code, 'judge', e.target.value)}
                                    className="w-16 border border-slate-200 rounded-lg px-2 py-1 text-center font-bold bg-slate-50/50"
                                  />
                                  <span className="text-[10px] text-slate-400">/ 10</span>
                                </div>
                              </td>
                              <td className="p-4 font-bold font-mono text-primary text-sm">
                                {p.score || 'N/A'} / 10
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}

              {/* PAGE 9: Permissions Control */}
              {activePage === 'permissions' && (
                <div className="space-y-6 animate-fade-in">
                  <div className="bg-white border border-slate-200/80 rounded-2xl p-6 sm:p-8 shadow-sm-custom">
                    <div className="pb-4 mb-6 border-b border-slate-100">
                      <h3 className="text-base font-bold text-slate-800 font-display">Permissions &amp; Policy Matrix</h3>
                      <p className="text-xs text-slate-400">Toggle role capabilities and workspace access rights for Volunteers, Judges, and Mentors.</p>
                    </div>

                    <div className="overflow-x-auto rounded-xl border border-slate-200/80">
                      <table className="w-full text-left border-collapse">
                        <thead>
                          <tr className="bg-slate-50/50 border-b border-slate-200/60">
                            <th className="p-4 text-[10px] font-bold text-slate-400 uppercase tracking-wider">System Role</th>
                            <th className="p-4 text-[10px] font-bold text-slate-400 uppercase tracking-wider text-center">Edit Rubric Scores</th>
                            <th className="p-4 text-[10px] font-bold text-slate-400 uppercase tracking-wider text-center">View Global Analytics</th>
                            <th className="p-4 text-[10px] font-bold text-slate-400 uppercase tracking-wider text-center">Approve Check-In</th>
                            <th className="p-4 text-[10px] font-bold text-slate-400 uppercase tracking-wider text-center">Print Gate Badges</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100 text-xs">
                          {Object.keys(permissions).map((role) => (
                            <tr key={role} className="hover:bg-slate-50/30">
                              <td className="p-4 font-bold text-slate-700 capitalize">{role}</td>
                              <td className="p-4 text-center">
                                <input 
                                  type="checkbox"
                                  checked={permissions[role].editScores}
                                  onChange={() => handleTogglePermission(role, 'editScores')}
                                  className="w-4 h-4 rounded text-indigo-950 focus:ring-indigo-500 cursor-pointer"
                                />
                              </td>
                              <td className="p-4 text-center">
                                <input 
                                  type="checkbox"
                                  checked={permissions[role].viewAnalytics}
                                  onChange={() => handleTogglePermission(role, 'viewAnalytics')}
                                  className="w-4 h-4 rounded text-indigo-950 focus:ring-indigo-500 cursor-pointer"
                                />
                              </td>
                              <td className="p-4 text-center">
                                <input 
                                  type="checkbox"
                                  checked={permissions[role].approveCheckin}
                                  onChange={() => handleTogglePermission(role, 'approveCheckin')}
                                  className="w-4 h-4 rounded text-indigo-950 focus:ring-indigo-500 cursor-pointer"
                                />
                              </td>
                              <td className="p-4 text-center">
                                <input 
                                  type="checkbox"
                                  checked={permissions[role].printBadges}
                                  onChange={() => handleTogglePermission(role, 'printBadges')}
                                  className="w-4 h-4 rounded text-indigo-950 focus:ring-indigo-500 cursor-pointer"
                                />
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}

              {/* PAGE 10: Event Monitoring */}
              {activePage === 'monitoring' && (
                <div className="space-y-6 animate-fade-in">
                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    
                    {/* Live Server Stats */}
                    <div className="bg-white border border-slate-200/80 rounded-2xl p-6 shadow-sm-custom lg:col-span-2 space-y-6">
                      <div className="pb-4 border-b border-slate-100 flex justify-between items-center">
                        <div>
                          <h3 className="text-base font-bold text-slate-800 font-display">Event Infrastructure Monitor</h3>
                          <p className="text-xs text-slate-400">Live metrics for sync sockets, active logins, CPU loads, and heap sizes.</p>
                        </div>
                        <span className="px-2.5 py-1 bg-green-50 text-green-700 text-[10px] font-extrabold rounded-full uppercase border border-green-200">
                          Operational
                        </span>
                      </div>

                      {/* Realtime Graph simulation / Bars */}
                      <div className="grid grid-cols-2 gap-4">
                        <div className="p-4 bg-slate-50 border border-slate-100 rounded-xl">
                          <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Active WebSockets</span>
                          <p className="text-2xl font-bold font-mono text-slate-800 mt-1">{wsConnections}</p>
                          <div className="w-full bg-slate-200 h-1.5 rounded-full mt-3 overflow-hidden">
                            <div className="bg-indigo-900 h-full rounded-full" style={{ width: '45%' }}></div>
                          </div>
                        </div>

                        <div className="p-4 bg-slate-50 border border-slate-100 rounded-xl">
                          <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Active Web Sessions</span>
                          <p className="text-2xl font-bold font-mono text-slate-800 mt-1">{activeSessions}</p>
                          <div className="w-full bg-slate-200 h-1.5 rounded-full mt-3 overflow-hidden">
                            <div className="bg-purple-600 h-full rounded-full" style={{ width: '60%' }}></div>
                          </div>
                        </div>

                        <div className="p-4 bg-slate-50 border border-slate-100 rounded-xl">
                          <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">System CPU Load</span>
                          <p className="text-2xl font-bold font-mono text-slate-800 mt-1">12%</p>
                          <div className="w-full bg-slate-200 h-1.5 rounded-full mt-3 overflow-hidden">
                            <div className="bg-emerald-500 h-full rounded-full" style={{ width: '12%' }}></div>
                          </div>
                        </div>

                        <div className="p-4 bg-slate-50 border border-slate-100 rounded-xl">
                          <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Heap Memory size</span>
                          <p className="text-2xl font-bold font-mono text-slate-800 mt-1">1.4 GB</p>
                          <div className="w-full bg-slate-200 h-1.5 rounded-full mt-3 overflow-hidden">
                            <div className="bg-amber-500 h-full rounded-full" style={{ width: '18%' }}></div>
                          </div>
                        </div>
                      </div>

                      {/* Control Panel Simulator */}
                      <div className="pt-4 border-t border-slate-100 space-y-3">
                        <span className="text-xs font-bold text-slate-700">Simulate Network &amp; Operations Interrupts</span>
                        <div className="flex gap-3 flex-wrap">
                          <button 
                            type="button"
                            onClick={triggerSimulatedAlert}
                            className="px-4 py-2 bg-indigo-950 hover:bg-slate-900 text-white rounded-xl text-xs font-bold transition-all shadow-sm"
                          >
                            Trigger Simulated Alert
                          </button>
                          <button 
                            type="button"
                            onClick={() => { setWsConnections(prev => prev + 1); showToast('info', 'Network Socket Opened', 'Simulated 1 new WebSocket client node joining the session.'); }}
                            className="px-4 py-2 border border-slate-200 hover:bg-slate-50 text-slate-600 rounded-xl text-xs font-bold transition-all"
                          >
                            Spawn WebSocket Client
                          </button>
                          <button 
                            type="button"
                            onClick={() => { setActiveSessions(prev => prev + 1); showToast('success', 'User Logged In', 'Simulated new admin control session login.'); }}
                            className="px-4 py-2 border border-slate-200 hover:bg-slate-50 text-slate-600 rounded-xl text-xs font-bold transition-all"
                          >
                            Force Active Session
                          </button>
                        </div>
                      </div>
                    </div>

                    {/* Right column: Main Stage Pitch Queue */}
                    <div className="bg-white border border-slate-200/80 rounded-2xl p-6 shadow-sm-custom space-y-6">
                      <div className="pb-4 border-b border-slate-100">
                        <h3 className="text-base font-bold text-slate-800 font-display">Main Stage Queue Monitor</h3>
                        <p className="text-xs text-slate-400">Live order of pitch presentations on the central stage.</p>
                      </div>

                      <div className="space-y-4">
                        {participants.map((p, idx) => {
                          const isCurrent = idx + 1 === pitchQueuePosition;
                          const isCompleted = idx + 1 < pitchQueuePosition;

                          return (
                            <div key={p.id} className={`p-4 rounded-xl border flex items-center justify-between ${
                              isCurrent ? 'bg-amber-50 border-amber-200' :
                              isCompleted ? 'bg-slate-50 border-slate-100 opacity-60' :
                              'bg-white border-slate-200'
                            }`}>
                              <div>
                                <span className={`text-[9px] font-extrabold uppercase px-1.5 py-0.5 rounded-full ${
                                  isCurrent ? 'bg-amber-500 text-white animate-pulse' :
                                  isCompleted ? 'bg-slate-200 text-slate-600' :
                                  'bg-slate-100 text-slate-400'
                                }`}>
                                  {isCurrent ? 'Pitching Now' : isCompleted ? 'Completed' : `Queue #${idx + 1}`}
                                </span>
                                <h4 className="text-xs font-bold text-slate-800 mt-2">{p.name}</h4>
                                <span className="text-[10px] text-slate-400 font-medium">{p.track}</span>
                              </div>
                              {isCurrent && (
                                <span className="text-xs font-bold font-mono text-amber-500">Live Feedback Loop</span>
                              )}
                            </div>
                          );
                        })}
                      </div>

                      <div className="pt-4 border-t border-slate-100">
                        <button 
                          type="button"
                          onClick={() => {
                            if (pitchQueuePosition < participants.length) {
                              setPitchQueuePosition(prev => prev + 1);
                              showToast('success', 'Queue Advanced', 'Advanced pitch queue to next startup.');
                            } else {
                              setPitchQueuePosition(1);
                              showToast('info', 'Queue Reset', 'Reset pitch queue to first startup.');
                            }
                          }}
                          className="w-full py-2.5 bg-amber-500 hover:bg-amber-600 text-white rounded-xl text-xs font-bold transition-all text-center flex items-center justify-center gap-1.5"
                        >
                          Advance Pitch Queue
                        </button>
                      </div>
                    </div>

                  </div>
                </div>
              )}

            </main>
          </div>

          {/* ============ PORTAL MODALS ============ */}
          <PromoteModal 
            isOpen={isPromoteOpen} 
            onClose={() => setIsPromoteOpen(false)} 
            participant={selectedParticipant}
            onConfirm={handleToggleShortlist}
          />

          {/* Render Toasts */}
          {ReactDOM.createPortal(
            <div className="flex flex-col gap-3 pointer-events-none">
              {toasts.map((toast) => (
                <Toast
                  key={toast.id}
                  id={toast.id}
                  type={toast.type}
                  title={toast.title}
                  message={toast.message}
                  onClose={removeToast}
                />
              ))}
            </div>,
            document.getElementById('toast-root')
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
