<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OTP Verification — AX Founder Exchange 2026</title>
  <meta name="description" content="Enter your one-time password to access the AX Founder Exchange 2026 Assessment Platform." />
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563EB',
            secondary: '#7C3AED',
            success: '#16A34A',
            danger: '#DC2626',
            bgcol: '#F8FAFC',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
          },
          borderRadius: {
            '16px': '16px',
          }
        }
      }
    }
  </script>
  
  <!-- React & Babel CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Custom Styles for Animations and Glassmorphism -->
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes blob-float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }
    .animate-blob {
      animation: blob-float 10s ease-in-out infinite;
    }
    .animate-blob-delayed {
      animation: blob-float 12s ease-in-out infinite;
      animation-delay: 2.5s;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    /* Input Focus Glow */
    .otp-glow:focus {
      outline: none;
      border-color: #2563EB;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
    }
  </style>
</head>
<body class="h-full bg-[#F8FAFC] font-sans antialiased text-[#0F172A] relative overflow-x-hidden">

  <!-- Toast Container -->
  <div id="toast-root" class="fixed top-5 right-5 z-50 flex flex-col gap-3 w-full max-w-sm pointer-events-none"></div>

  <!-- Main Root element for React App -->
  <div id="root" class="h-full"></div>

  <!-- React Application Logic -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Custom SVG Icons (Lucide equivalences)
    const ArrowLeftIcon = () => (
      <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
    );

    const ShieldCheckIcon = () => (
      <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
      </svg>
    );

    const SpinnerIcon = () => (
      <svg className="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
      </svg>
    );

    const CheckCircleIcon = () => (
      <svg className="w-6 h-6 text-green-500 shrink-0" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    );

    const XCircleIcon = () => (
      <svg className="w-6 h-6 text-red-500 shrink-0" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    );

    const CloseIcon = () => (
      <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    );

    // Toast Component
    const Toast = ({ id, type, title, message, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(() => {
          onClose(id);
        }, 4000);
        return () => clearTimeout(timer);
      }, [id, onClose]);

      return (
        <div className="flex items-start gap-3 bg-white/95 backdrop-blur border border-slate-100 rounded-xl p-4 shadow-lg ring-1 ring-black/5 animate-fade-in pointer-events-auto transition-all duration-300">
          {type === 'success' ? <CheckCircleIcon /> : <XCircleIcon />}
          <div className="flex-1 min-w-0">
            <p className="text-sm font-semibold text-slate-900">{title}</p>
            {message && <p className="text-xs text-slate-500 mt-0.5">{message}</p>}
          </div>
          <button 
            onClick={() => onClose(id)} 
            className="text-slate-400 hover:text-slate-600 transition-colors duration-150 shrink-0"
            aria-label="Dismiss notification"
          >
            <CloseIcon />
          </button>
        </div>
      );
    };

    function App() {
      const [otp, setOtp] = useState(Array(6).fill(''));
      const [isLoading, setIsLoading] = useState(false);
      const [timer, setTimer] = useState(30);
      const [toasts, setToasts] = useState([]);
      const inputsRef = useRef([]);

      // Auto-focus first input on mount
      useEffect(() => {
        if (inputsRef.current[0]) {
          inputsRef.current[0].focus();
        }
      }, []);

      // Resend OTP Countdown Timer
      useEffect(() => {
        if (timer > 0) {
          const interval = setInterval(() => {
            setTimer((prev) => prev - 1);
          }, 1000);
          return () => clearInterval(interval);
        }
      }, [timer]);

      // Add toast message
      const showToastMessage = (type, title, message) => {
        const id = Date.now().toString();
        setToasts((prev) => [...prev, { id, type, title, message }]);
      };

      const removeToast = (id) => {
        setToasts((prev) => prev.filter((t) => t.id !== id));
      };

      // Handle individual digit input
      const handleChange = (e, index) => {
        const val = e.target.value;
        if (isNaN(Number(val))) return; // Only allow numbers

        const newOtp = [...otp];
        newOtp[index] = val.substring(val.length - 1); // Keep last digit
        setOtp(newOtp);

        // Auto-advance if digit entered
        if (val && index < 5) {
          inputsRef.current[index + 1].focus();
        }
      };

      // Handle keyboard navigation (Backspace, Left/Right arrow)
      const handleKeyDown = (e, index) => {
        if (e.key === 'Backspace') {
          if (!otp[index] && index > 0) {
            // If current box is empty, clear previous box and focus it
            const newOtp = [...otp];
            newOtp[index - 1] = '';
            setOtp(newOtp);
            inputsRef.current[index - 1].focus();
          } else {
            // Otherwise just clear current box
            const newOtp = [...otp];
            newOtp[index] = '';
            setOtp(newOtp);
          }
        } else if (e.key === 'ArrowLeft' && index > 0) {
          inputsRef.current[index - 1].focus();
        } else if (e.key === 'ArrowRight' && index < 5) {
          inputsRef.current[index + 1].focus();
        }
      };

      // Handle paste verification code
      const handlePaste = (e) => {
        e.preventDefault();
        const data = e.clipboardData.getData('text').trim();
        if (data.length !== 6 || isNaN(Number(data))) {
          showToastMessage('error', 'Invalid Paste', 'Please paste a valid 6-digit numeric OTP.');
          return;
        }

        const pastedArray = data.split('');
        setOtp(pastedArray);
        inputsRef.current[5].focus(); // Focus last box
      };

      // Submit OTP Verification
      const handleSubmit = (e) => {
        e.preventDefault();
        const fullCode = otp.join('');
        
        if (fullCode.length !== 6) return;

        setIsLoading(true);

        setTimeout(() => {
          setIsLoading(false);
          // Let's check correctness: e.g. '000000' triggers a failure toast for demonstration, any other 6-digits succeed!
          if (fullCode === '000000') {
            showToastMessage('error', 'Verification Failed', 'The OTP you entered is invalid or has expired.');
            // Clear inputs
            setOtp(Array(6).fill(''));
            inputsRef.current[0].focus();
          } else {
            showToastMessage('success', 'Verification Successful', 'Identity verified. Access granted.');
            setTimeout(() => {
              window.location.href = 'dashboard.html';
            }, 1000);
          }
        }, 1500);
      };

      // Resend OTP Action
      const handleResend = () => {
        setTimer(30);
        showToastMessage('success', 'OTP Resent', 'A new 6-digit code has been sent to your registered device.');
        setOtp(Array(6).fill(''));
        inputsRef.current[0].focus();
      };

      const isSubmitDisabled = otp.some((val) => val === '') || isLoading;

      return (
        <div className="min-h-screen w-full flex flex-col justify-between items-center py-10 px-4 sm:px-6 lg:px-8 relative overflow-hidden bg-[#F8FAFC]">
          
          {/* Animated Background blobs for premium glassmorphism aesthetic */}
          <div className="absolute top-[-10%] right-[-10%] w-[80vw] h-[80vw] md:w-[45rem] md:h-[45rem] rounded-full bg-gradient-to-br from-blue-300/30 to-purple-400/20 blur-[130px] pointer-events-none animate-blob"></div>
          <div className="absolute bottom-[-15%] left-[-15%] w-[85vw] h-[85vw] md:w-[50rem] md:h-[50rem] rounded-full bg-gradient-to-tr from-purple-300/30 to-blue-400/20 blur-[130px] pointer-events-none animate-blob-delayed"></div>

          {/* Logo & Platform Info */}
          <div className="flex flex-col items-center text-center z-10 animate-fade-in mt-4">
            <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-[#2563EB] to-[#7C3AED] flex items-center justify-center shadow-lg shadow-blue-500/25 hover:scale-105 transition-transform duration-300 mb-5">
              <svg className="w-7 h-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2">
                <path strokeLinecap="round" strokeLinejoin="round" d="M13 2 3 14h7l-1 8 10-12h-7l1-8Z"/>
              </svg>
            </div>
            
            <h1 className="font-display text-2xl sm:text-3xl font-bold tracking-tight text-slate-900 mb-1">
              AX Founder Exchange 2026
            </h1>
            <p className="text-sm font-medium text-slate-500">
              Assessment & Evaluation Platform
            </p>
          </div>

          {/* Glassmorphism Verification Card */}
          <div className="w-full max-w-[460px] z-10 glass-card rounded-[16px] shadow-[0_20px_50px_rgba(15,26,77,0.08)] p-6 sm:p-10 my-8 animate-fade-in relative transition-all duration-300 hover:shadow-[0_24px_60px_rgba(15,26,77,0.12)]">
            <div className="flex items-center justify-between mb-6 border-b border-slate-100/60 pb-4">
              <h2 className="text-lg font-bold text-slate-800">
                OTP Verification
              </h2>
              <span className="px-2.5 py-1 text-xs font-semibold rounded-full bg-blue-50 text-blue-600 border border-blue-100 flex items-center gap-1.5">
                <ShieldCheckIcon />
                2FA Enabled
              </span>
            </div>

            <p className="text-sm text-slate-500 mb-8 leading-relaxed">
              We have sent a 6-digit one-time password to your registered device. Enter the code below to complete sign-in.
            </p>

            <form onSubmit={handleSubmit} className="space-y-6">
              
              {/* Segmented 6-digit OTP Inputs */}
              <div>
                <div className="flex justify-between gap-2.5 sm:gap-3.5 mb-2" onPaste={handlePaste}>
                  {otp.map((digit, index) => (
                    <input
                      key={index}
                      type="text"
                      ref={(el) => (inputsRef.current[index] = el)}
                      value={digit}
                      onChange={(e) => handleChange(e, index)}
                      onKeyDown={(e) => handleKeyDown(e, index)}
                      maxLength={1}
                      disabled={isLoading}
                      className="w-12 h-14 sm:w-14 sm:h-16 text-center text-xl font-bold bg-white border border-slate-200 rounded-xl transition-all duration-200 otp-glow"
                    />
                  ))}
                </div>
              </div>

              {/* Primary Verification Button */}
              <button
                type="submit"
                disabled={isSubmitDisabled}
                className={`w-full font-bold text-white rounded-xl py-3.5 px-4 flex items-center justify-center transition-all duration-200 transform active:scale-[0.98] ${
                  isSubmitDisabled
                    ? 'bg-slate-300 cursor-not-allowed opacity-60 shadow-none'
                    : 'bg-gradient-to-r from-primary to-secondary hover:shadow-lg hover:shadow-blue-500/20 active:translate-y-px hover:brightness-105'
                }`}
              >
                {isLoading ? (
                  <>
                    <SpinnerIcon />
                    Verifying OTP...
                  </>
                ) : (
                  'Verify & Proceed'
                )}
              </button>

              {/* Resend Timer & Links */}
              <div className="flex flex-col items-center justify-center gap-3 pt-2 text-sm">
                {timer > 0 ? (
                  <p className="text-slate-400 font-medium">
                    Resend code in <span className="text-slate-600 font-bold">{timer}s</span>
                  </p>
                ) : (
                  <button
                    type="button"
                    onClick={handleResend}
                    disabled={isLoading}
                    className="text-primary hover:text-blue-700 font-semibold transition-colors duration-150"
                  >
                    Resend Verification Code
                  </button>
                )}
                
                <a
                  href="login.html"
                  className="flex items-center gap-1.5 text-xs font-semibold text-slate-400 hover:text-slate-600 transition-colors duration-150 mt-2"
                >
                  <ArrowLeftIcon />
                  Back to Sign In
                </a>
              </div>
            </form>
          </div>

          {/* Footer content */}
          <div className="text-center z-10 animate-fade-in text-xs font-semibold text-slate-400">
            <p>© 2026 AX Founder Exchange</p>
          </div>

          {/* Render Toasts */}
          {ReactDOM.createPortal(
            <div className="flex flex-col gap-3 pointer-events-none">
              {toasts.map((toast) => (
                <Toast
                  key={toast.id}
                  id={toast.id}
                  type={toast.type}
                  title={toast.title}
                  message={toast.message}
                  onClose={removeToast}
                />
              ))}
            </div>,
            document.getElementById('toast-root')
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
