<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — AX Founder Exchange 2026</title>
  <meta name="description" content="Sign in to AX Founder Exchange 2026, the innovation assessment and startup evaluation platform." />
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563EB',
            secondary: '#7C3AED',
            success: '#16A34A',
            danger: '#DC2626',
            bgcol: '#F8FAFC',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
          },
          borderRadius: {
            '16px': '16px',
          }
        }
      }
    }
  </script>
  
  <!-- React & Babel CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Custom Styles for Animations and Glassmorphism -->
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes blob-float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }
    .animate-blob {
      animation: blob-float 10s ease-in-out infinite;
    }
    .animate-blob-delayed {
      animation: blob-float 12s ease-in-out infinite;
      animation-delay: 2.5s;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    /* Input Focus Glow */
    .input-glow:focus {
      outline: none;
      border-color: #2563EB;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
    }
    .input-glow-danger:focus {
      outline: none;
      border-color: #DC2626;
      box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.15);
    }
  </style>
</head>
<body class="h-full bg-[#F8FAFC] font-sans antialiased text-[#0F172A] relative overflow-x-hidden">

  <!-- Toast Container -->
  <div id="toast-root" class="fixed top-5 right-5 z-50 flex flex-col gap-3 w-full max-w-sm pointer-events-none"></div>

  <!-- Main Root element for React App -->
  <div id="root" class="h-full"></div>

  <!-- React Application Logic -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Custom SVG Icons (Lucide equivalences)
    const UserIcon = () => (
      <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
    );

    const LockIcon = () => (
      <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" strokeLinecap="round" strokeLinejoin="round" />
        <path strokeLinecap="round" strokeLinejoin="round" d="M7 11V7a5 5 0 0110 0v4" />
      </svg>
    );

    const EyeIcon = () => (
      <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        <path strokeLinecap="round" strokeLinejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
      </svg>
    );

    const EyeOffIcon = () => (
      <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88L1 1m22 22L14.12 14.12M15 4.5c4.478 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.4M9.5 4.5A9.957 9.957 0 0112 5c1.007 0 1.972.15 2.875.43" />
      </svg>
    );

    const ShieldIcon = () => (
      <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
      </svg>
    );

    const SpinnerIcon = () => (
      <svg className="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" />
        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
      </svg>
    );

    const CheckCircleIcon = () => (
      <svg className="w-6 h-6 text-green-500 shrink-0" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    );

    const XCircleIcon = () => (
      <svg className="w-6 h-6 text-red-500 shrink-0" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    );

    const CloseIcon = () => (
      <svg className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    );

    // Toast Component
    const Toast = ({ id, type, title, message, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(() => {
          onClose(id);
        }, 4000);
        return () => clearTimeout(timer);
      }, [id, onClose]);

      return (
        <div className="flex items-start gap-3 bg-white/95 backdrop-blur border border-slate-100 rounded-xl p-4 shadow-lg ring-1 ring-black/5 animate-fade-in pointer-events-auto transition-all duration-300">
          {type === 'success' ? <CheckCircleIcon /> : <XCircleIcon />}
          <div className="flex-1 min-w-0">
            <p className="text-sm font-semibold text-slate-900">{title}</p>
            {message && <p className="text-xs text-slate-500 mt-0.5">{message}</p>}
          </div>
          <button 
            onClick={() => onClose(id)} 
            className="text-slate-400 hover:text-slate-600 transition-colors duration-150 shrink-0"
            aria-label="Dismiss notification"
          >
            <CloseIcon />
          </button>
        </div>
      );
    };

    // Modal Component for Forgot Password
    const ForgotPasswordModal = ({ isOpen, onClose, onSubmit }) => {
      const [email, setEmail] = useState('');
      const [error, setError] = useState('');

      if (!isOpen) return null;

      const handleForgotPasswordSubmit = (e) => {
        e.preventDefault();
        if (!email) {
          setError('Email is required');
          return;
        }
        if (!/\S+@\S+\.\S+/.test(email)) {
          setError('Enter a valid email address');
          return;
        }
        setError('');
        onSubmit(email);
        setEmail('');
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={onClose}></div>
          <div className="bg-white rounded-2xl p-6 sm:p-8 max-w-md w-full shadow-2xl relative z-10 glass-card animate-fade-in">
            <h3 className="text-lg font-bold text-slate-900 mb-2">Reset Password</h3>
            <p className="text-sm text-slate-500 mb-6">Enter your registered email address and we'll send you a link to reset your password.</p>
            
            <form onSubmit={handleForgotPasswordSubmit} className="space-y-4">
              <div className="relative">
                <label htmlFor="reset-email" className="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Email Address</label>
                <input 
                  type="email" 
                  id="reset-email" 
                  value={email}
                  onChange={(e) => {
                    setEmail(e.target.value);
                    if (error) setError('');
                  }}
                  placeholder="name@company.com" 
                  className={`w-full bg-white border ${error ? 'border-danger' : 'border-slate-200'} rounded-xl px-4 py-3 text-sm input-glow`}
                  required
                />
                {error && <p className="text-xs text-danger mt-1.5 flex items-center gap-1">
                  <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m0 3.75h.008M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
                  {error}
                </p>}
              </div>

              <div className="flex gap-3 justify-end pt-2">
                <button 
                  type="button" 
                  onClick={onClose}
                  className="px-4 py-2.5 text-sm font-semibold text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-xl transition-all duration-150"
                >
                  Cancel
                </button>
                <button 
                  type="submit" 
                  className="px-5 py-2.5 text-sm font-semibold text-white bg-primary hover:bg-blue-700 rounded-xl transition-all duration-150 shadow-md shadow-blue-500/10 hover:shadow-blue-500/20"
                >
                  Send Reset Link
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    };

    function App() {
      // States
      const [role, setRole] = useState('participant'); // 'participant', 'mentor', 'admin'
      const [idValue, setIdValue] = useState('');
      const [password, setPassword] = useState('');
      const [showPassword, setShowPassword] = useState(false);
      const [isLoading, setIsLoading] = useState(false);
      
      // Inline Validation Errors
      const [idError, setIdError] = useState('');
      const [passwordError, setPasswordError] = useState('');
      
      // Toasts
      const [toasts, setToasts] = useState([]);
      const [isModalOpen, setIsModalOpen] = useState(false);

      // Add toast message
      const showToastMessage = (type, title, message) => {
        const id = Date.now().toString();
        setToasts((prev) => [...prev, { id, type, title, message }]);
      };

      const removeToast = (id) => {
        setToasts((prev) => prev.filter((t) => t.id !== id));
      };

      // Form submission
      const handleSubmit = (e) => {
        e.preventDefault();
        
        // Final validation check
        let hasError = false;
        if (!idValue.trim()) {
          const roleLabel = role === 'admin' ? 'Admin ID' : role === 'mentor' ? 'Mentor ID' : 'Participant ID';
          setIdError(`${roleLabel} is required`);
          hasError = true;
        }
        if (!password) {
          setPasswordError('Password is required');
          hasError = true;
        }

        if (hasError) return;

        setIsLoading(true);

        // Simulate authentication
        setTimeout(() => {
          setIsLoading(false);
          
          // Custom interactive check for UI validation testing
          if (password.toLowerCase() === 'error' || idValue.toLowerCase() === 'fail') {
            showToastMessage('error', 'Authentication Failed', 'Invalid credentials. Please verify and try again.');
          } else {
            // Save role in session storage to handle conditional routing after OTP
            sessionStorage.setItem('userRole', role);
            showToastMessage('success', 'Sign In Successful', 'Credentials verified. Redirecting to OTP verification...');
            setTimeout(() => {
              window.location.href = 'otp.html';
            }, 1000);
          }
        }, 1500);
      };

      // Modal reset submission handler
      const handleResetPassword = (email) => {
        setIsModalOpen(false);
        showToastMessage('success', 'Reset Link Sent', `Password reset instructions sent. Redirecting to reset page...`);
        setTimeout(() => {
          window.location.href = 'reset-password.html';
        }, 1500);
      };

      // Check if button should be disabled
      const isSubmitDisabled = !idValue.trim() || !password || isLoading;

      return (
        <div className="min-h-screen w-full flex flex-col justify-between items-center py-10 px-4 sm:px-6 lg:px-8 relative overflow-hidden bg-[#F8FAFC]">
          
          {/* Animated Background blobs for premium glassmorphism aesthetic */}
          <div className="absolute top-[-10%] right-[-10%] w-[80vw] h-[80vw] md:w-[45rem] md:h-[45rem] rounded-full bg-gradient-to-br from-blue-300/30 to-purple-400/20 blur-[130px] pointer-events-none animate-blob"></div>
          <div className="absolute bottom-[-15%] left-[-15%] w-[85vw] h-[85vw] md:w-[50rem] md:h-[50rem] rounded-full bg-gradient-to-tr from-purple-300/30 to-blue-400/20 blur-[130px] pointer-events-none animate-blob-delayed"></div>

          {/* Logo, Title & Subtitle at the top */}
          <div className="flex flex-col items-center text-center z-10 animate-fade-in mt-4">
            {/* AX Platform Logo */}
            <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-[#2563EB] to-[#7C3AED] flex items-center justify-center shadow-lg shadow-blue-500/25 hover:scale-105 transition-transform duration-300 mb-5">
              <svg className="w-7 h-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2">
                <path strokeLinecap="round" strokeLinejoin="round" d="M13 2 3 14h7l-1 8 10-12h-7l1-8Z"/>
              </svg>
            </div>
            
            <h1 className="font-display text-2xl sm:text-3xl font-bold tracking-tight text-slate-900 mb-1">
              AX Founder Exchange 2026
            </h1>
            <p className="text-sm font-medium text-slate-500">
              Assessment & Evaluation Platform
            </p>
          </div>

          {/* Glassmorphism Login Card */}
          <div className="w-full max-w-[440px] z-10 glass-card rounded-[16px] shadow-[0_20px_50px_rgba(15,26,77,0.08)] p-6 sm:p-10 my-8 animate-fade-in relative transition-all duration-300 hover:shadow-[0_24px_60px_rgba(15,26,77,0.12)]">
            <div className="flex items-center justify-between mb-6 border-b border-slate-100/60 pb-4">
              <h2 className="text-lg font-bold text-slate-800">
                {role === 'admin' ? 'Admin Portal' : role === 'mentor' ? 'Mentor Portal' : 'Participant Portal'}
              </h2>
              <span className={`px-2.5 py-1 text-xs font-semibold rounded-full ${role === 'admin' ? 'bg-purple-50 text-purple-600 border border-purple-100' : role === 'mentor' ? 'bg-amber-50 text-amber-600 border border-amber-100' : 'bg-blue-50 text-blue-600 border border-blue-100'}`}>
                {role === 'admin' ? 'Staff Access' : role === 'mentor' ? 'Mentor Access' : 'Cohort 2026'}
              </span>
            </div>

            {/* Segmented Control Tabs */}
            <div className="flex bg-slate-100/80 p-1 rounded-xl mb-6 border border-slate-200/50">
              <button
                type="button"
                onClick={() => { setRole('participant'); setIdValue(''); setPassword(''); setIdError(''); setPasswordError(''); }}
                className={`flex-grow py-2 text-xs font-bold rounded-lg transition-all ${role === 'participant' ? 'bg-white text-blue-600 shadow-sm border border-slate-200/20' : 'text-slate-500 hover:text-slate-700'}`}
              >
                Participant
              </button>
              <button
                type="button"
                onClick={() => { setRole('mentor'); setIdValue(''); setPassword(''); setIdError(''); setPasswordError(''); }}
                className={`flex-grow py-2 text-xs font-bold rounded-lg transition-all ${role === 'mentor' ? 'bg-white text-amber-600 shadow-sm border border-slate-200/20' : 'text-slate-500 hover:text-slate-700'}`}
              >
                Mentor
              </button>
              <button
                type="button"
                onClick={() => { setRole('admin'); setIdValue(''); setPassword(''); setIdError(''); setPasswordError(''); }}
                className={`flex-grow py-2 text-xs font-bold rounded-lg transition-all ${role === 'admin' ? 'bg-white text-purple-600 shadow-sm border border-slate-200/20' : 'text-slate-500 hover:text-slate-700'}`}
              >
                Admin
              </button>
            </div>

            <form onSubmit={handleSubmit} className="space-y-6">
              
              {/* Field 1: ID */}
              <div>
                <label htmlFor="id-field" className="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">
                  {role === 'admin' ? 'Admin ID / Email' : role === 'mentor' ? 'Mentor ID / Email' : 'Participant ID'}
                </label>
                <div className="relative">
                  <div className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400 transition-colors">
                    {role === 'admin' ? <ShieldIcon /> : role === 'mentor' ? <ShieldIcon /> : <UserIcon />}
                  </div>
                  <input
                    type="text"
                    id="id-field"
                    value={idValue}
                    onChange={(e) => {
                      setIdValue(e.target.value);
                      if (idError) setIdError('');
                    }}
                    placeholder={role === 'admin' ? "Enter your Admin ID" : role === 'mentor' ? "Enter your Mentor ID" : "Enter your Participant ID"}
                    className={`w-full bg-white border ${idError ? 'border-danger' : 'border-slate-200'} rounded-xl pl-11 pr-4 py-3.5 text-sm transition-all duration-200 ${idError ? 'input-glow-danger' : 'input-glow'} placeholder:text-slate-400`}
                    disabled={isLoading}
                    autoComplete="username"
                  />
                </div>
                {idError && (
                  <p className="text-xs text-danger mt-1.5 flex items-center gap-1">
                    <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m0 3.75h.008M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
                    {idError}
                  </p>
                )}
              </div>

              {/* Field 2: Password */}
              <div>
                <div className="flex justify-between items-center mb-2">
                  <label htmlFor="password-field" className="block text-xs font-bold text-slate-500 uppercase tracking-wider">
                    Password
                  </label>
                  <button
                    type="button"
                    onClick={() => setIsModalOpen(true)}
                    className="text-xs font-semibold text-primary hover:text-blue-700 transition-colors duration-150"
                  >
                    Forgot Password?
                  </button>
                </div>
                <div className="relative">
                  <div className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                    <LockIcon />
                  </div>
                  <input
                    type={showPassword ? "text" : "password"}
                    id="password-field"
                    value={password}
                    onChange={(e) => {
                      setPassword(e.target.value);
                      if (passwordError) setPasswordError('');
                    }}
                    placeholder="Enter your password"
                    className={`w-full bg-white border ${passwordError ? 'border-danger' : 'border-slate-200'} rounded-xl pl-11 pr-11 py-3.5 text-sm transition-all duration-200 ${passwordError ? 'input-glow-danger' : 'input-glow'} placeholder:text-slate-400`}
                    disabled={isLoading}
                    autoComplete="current-password"
                  />
                  <button
                    type="button"
                    onClick={() => setShowPassword(!showPassword)}
                    className="absolute inset-y-0 right-0 pr-3.5 flex items-center text-slate-400 hover:text-slate-600 transition-colors duration-150"
                    aria-label={showPassword ? "Hide password" : "Show password"}
                  >
                    {showPassword ? <EyeOffIcon /> : <EyeIcon />}
                  </button>
                </div>
                {passwordError && (
                  <p className="text-xs text-danger mt-1.5 flex items-center gap-1">
                    <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m0 3.75h.008M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
                    {passwordError}
                  </p>
                )}
              </div>

              {/* Primary Submit Button */}
              <button
                type="submit"
                disabled={isSubmitDisabled}
                className={`w-full font-bold text-white rounded-xl py-3.5 px-4 flex items-center justify-center transition-all duration-200 transform active:scale-[0.98] ${
                  isSubmitDisabled
                    ? 'bg-slate-300 cursor-not-allowed opacity-60 shadow-none'
                    : 'bg-gradient-to-r from-primary to-secondary hover:shadow-lg hover:shadow-blue-500/20 active:translate-y-px hover:brightness-105'
                }`}
              >
                {isLoading ? (
                  <>
                    <SpinnerIcon />
                    Authenticating...
                  </>
                ) : (
                  'Login'
                )}
              </button>
            </form>
          </div>

          {/* Footer content */}
          <div className="text-center z-10 animate-fade-in text-xs font-semibold text-slate-400">
            <p>© 2026 AX Founder Exchange</p>
          </div>

          {/* Render Toasts */}
          {ReactDOM.createPortal(
            <div className="flex flex-col gap-3 pointer-events-none">
              {toasts.map((toast) => (
                <Toast
                  key={toast.id}
                  id={toast.id}
                  type={toast.type}
                  title={toast.title}
                  message={toast.message}
                  onClose={removeToast}
                />
              ))}
            </div>,
            document.getElementById('toast-root')
          )}

          {/* Forgot Password Modal */}
          <ForgotPasswordModal
            isOpen={isModalOpen}
            onClose={() => setIsModalOpen(false)}
            onSubmit={handleResetPassword}
          />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
