          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }

    .animate-fade-in {
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .input-glow:focus {
      outline: none;
      border-color: #2563EB;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
    }
    /* Hide scrollbar for Chrome, Safari and Opera */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    /* Hide scrollbar for IE, Edge and Firefox */
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */

</head>

        <path strokeLinecap="round" strokeLinejoin="round" d="M16.5 18.75h-9m9 0a3 3 0 0 1 3 3h-15a3 3 0 0 1 3-3m9 0v-3.375c0-.621-.503-1.125-1.125-1.125h-.871M7.5 18.75v-3.375c0-.621.504-1.125 1.125-1.125h.872m5.007 0H9.497m5.007 0a7.454 7.454 0 0 1-.982-3.172M9.497 14.25a7.454 7.454 0 0 0 .981-3.172M5.25 4.236c-.982.143-1.954.317-2.916.52A6.003 6.003 0 0 0 7.73 9.728M5.25 4.236V4.5c0 2.108.966 3.99 2.48 5.228M5.25 4.236V2.721C7.456 2.41 9.71 2.25 12 2.25c2.291 0 4.545.16 6.75.47v1.516M7.73 9.728a6.726 6.726 0 0 0 2.748 1.35m8.272-6.842V4.5c0 2.108-.966 3.99-2.48 5.228m2.48-5.492a46.32 46.32 0 0 1 2.916.52 6.003 6.003 0 0 1-5.395 4.972m0 0a6.726 6.726 0 0 1-2.749 1.35" />

    const NotificationsIcon = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path strokeLinecap="round" strokeLinejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
      </svg>
    );

    const SettingsIcon = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path strokeLinecap="round" strokeLinejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 0 1 0 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 0 1 0-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" />
        <path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />

    );

    const HelpIcon = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="1.8">
        <path strokeLinecap="round" strokeLinejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />

      </svg>
    );

    const LogoutIcon = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H3" />
      </svg>
    );

    const CloseIcon = () => (
      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    );

    const CheckCircleIcon = () => (
      <svg className="w-6 h-6 text-green-500 shrink-0" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    );

    const XCircleIcon = () => (
      <svg className="w-6 h-6 text-red-500 shrink-0" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    );

    // ==========================================
    // TOAST COMPONENT
    // ==========================================
    const Toast = ({ id, type, title, message, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(() => onClose(id), 3500);
        return () => clearTimeout(timer);
      }, [id, onClose]);

      return (
        <div className="flex items-start gap-3 bg-white/95 backdrop-blur border border-slate-100 rounded-xl p-4 shadow-lg-custom ring-1 ring-black/5 animate-fade-in pointer-events-auto transition-all duration-300">
          {type === 'success' ? <CheckCircleIcon /> : <XCircleIcon />}
          <div className="flex-1 min-w-0">
            <p className="text-sm font-semibold text-slate-900">{title}</p>
            {message && <p className="text-xs text-slate-500 mt-0.5">{message}</p>}
          </div>
          <button 
            onClick={() => onClose(id)} 
            className="text-slate-400 hover:text-slate-600 transition-colors duration-150 shrink-0"
            aria-label="Dismiss notification"
          >
            <CloseIcon />
          </button>
        </div>
      );
    };

    // ==========================================
    // DIALOGS / MODALS
    // ==========================================
    const AddParticipantModal = ({ isOpen, onClose, onAdd }) => {
      const [name, setName] = useState('');
      const [startup, setStartup] = useState('');
      const [zone, setZone] = useState('Zone C — SaaS & AI');

      if (!isOpen) return null;

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!name || !startup) return;
        onAdd({ name, startup, zone });
        setName('');
        setStartup('');
        onClose();
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={onClose}></div>
          <div className="bg-white rounded-2xl p-6 sm:p-8 max-w-md w-full shadow-lg-custom relative z-10 glass-card animate-fade-in border border-white/40">
            <div className="flex justify-between items-center mb-6">
              <h3 className="text-lg font-bold text-slate-900">Add New Participant</h3>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600">
                <CloseIcon />
              </button>
            </div>
            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Founder Name</label>
                <input 
                  type="text" 
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  placeholder="e.g. Devika Rao" 
                  className="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm input-glow"
                  required
                />
              </div>
              <div>
                <label className="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Startup Name</label>
                <input 
                  type="text" 
                  value={startup}
                  onChange={(e) => setStartup(e.target.value)}
                  placeholder="e.g. Nimbus AI" 
                  className="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm input-glow"
                  required
                />
              </div>
              <div>
                <label className="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Evaluation Zone</label>
                <select 
                  value={zone}
                  onChange={(e) => setZone(e.target.value)}
                  className="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm input-glow appearance-none"
                >
                  <option value="Zone A — FinTech">Zone A — FinTech</option>
                  <option value="Zone B — HealthTech">Zone B — HealthTech</option>
                  <option value="Zone C — SaaS & AI">Zone C — SaaS & AI</option>
                  <option value="Zone D — Web3 & Infra">Zone D — Web3 & Infra</option>
                </select>
              </div>
              <div className="flex gap-3 justify-end pt-4">
                <button 
                  type="button" 
                  onClick={onClose}
                  className="px-4 py-2.5 text-sm font-semibold text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-xl transition-all duration-150"
                >
                  Cancel
                </button>
                <button 
                  type="submit" 
                  className="px-5 py-2.5 text-sm font-semibold text-white bg-primary hover:bg-primary-dark rounded-xl transition-all duration-150 shadow-md shadow-blue-500/10 hover:shadow-blue-500/20"
                >
                  Register Participant
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    };

    const AssignMentorModal = ({ isOpen, onClose, onAssign }) => {
      const [mentor, setMentor] = useState('Arjun Nair');
      const [zone, setZone] = useState('Zone C — SaaS & AI');

      if (!isOpen) return null;

      const handleSubmit = (e) => {
        e.preventDefault();
        onAssign({ mentor, zone });
        onClose();
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={onClose}></div>
          <div className="bg-white rounded-2xl p-6 sm:p-8 max-w-md w-full shadow-lg-custom relative z-10 glass-card animate-fade-in border border-white/40">
            <div className="flex justify-between items-center mb-6">
              <h3 className="text-lg font-bold text-slate-900">Assign Mentor to Zone</h3>
              <button onClick={onClose} className="text-slate-400 hover:text-slate-600">
                <CloseIcon />
              </button>
            </div>
            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Select Mentor</label>
                <select 
                  value={mentor}
                  onChange={(e) => setMentor(e.target.value)}
                  className="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm input-glow"
                >
                  <option value="Arjun Nair">Arjun Nair</option>
                  <option value="Siddharth Mehta">Siddharth Mehta</option>
                  <option value="Priya Sharma">Priya Sharma</option>
                  <option value="Karan Johar">Karan Johar</option>
                </select>
              </div>
              <div>
                <label className="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-2">Evaluation Zone</label>
                <select 
                  value={zone}
                  onChange={(e) => setZone(e.target.value)}
                  className="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm input-glow"
                >
                  <option value="Zone A — FinTech">Zone A — FinTech</option>
                  <option value="Zone B — HealthTech">Zone B — HealthTech</option>
                  <option value="Zone C — SaaS & AI">Zone C — SaaS & AI</option>
                  <option value="Zone D — Web3 & Infra">Zone D — Web3 & Infra</option>
                </select>
              </div>
              <div className="flex gap-3 justify-end pt-4">
                <button 
                  type="button" 
                  onClick={onClose}
                  className="px-4 py-2.5 text-sm font-semibold text-slate-700 bg-slate-100 hover:bg-slate-200 rounded-xl transition-all duration-150"
                >
                  Cancel
                </button>
                <button 
                  type="submit" 
                  className="px-5 py-2.5 text-sm font-semibold text-white bg-primary hover:bg-primary-dark rounded-xl transition-all duration-150 shadow-md shadow-blue-500/10 hover:shadow-blue-500/20"
                >
                  Confirm Assignment
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    };

    // ==========================================
    // MAIN APP COMPONENT
    // ==========================================
    function App() {
      const [activePage, setActivePage] = useState('dashboard');
      const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
      const [isMobileOpen, setIsMobileOpen] = useState(false);
      const [isNotifOpen, setIsNotifOpen] = useState(false);
      const [isUserDropdownOpen, setIsUserDropdownOpen] = useState(false);
      const [toasts, setToasts] = useState([]);

                        notif.type === 'success' ? 'bg-green-50 text-success' :
                        notif.type === 'warning' ? 'bg-amber-50 text-warning' :
                        notif.type === 'primary' ? 'bg-blue-50 text-primary' : 'bg-slate-100 text-slate-500'
                      }`}>
                        {notif.type === 'success' && (
                          <svg className="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                            <path strokeLinecap="round" strokeLinejoin="round" d="m4.5 12.75 6 6 9-13.5" />
                          </svg>
                        )}
                        {notif.type === 'warning' && (
                          <svg className="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 21.14a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z" />
                          </svg>
                        )}
                        {notif.type === 'primary' && (
                          <svg className="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M10.34 15.84c-.688-.06-1.386-.09-2.09-.09H7.5a4.5 4.5 0 1 1 0-9h.75c.704 0 1.402-.03 2.09-.09" />
                          </svg>
                        )}
                        {notif.type === 'neutral' && (
                          <svg className="w-4.5 h-4.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                            <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5A3.375 3.375 0 0 0 10.125 2.25H8.25" />
                          </svg>
                        )}
                      </div>

                      <div className="flex-1 min-w-0">
                        <div className="flex items-center justify-between gap-2">
                          <p className="text-xs font-bold text-slate-800 truncate">{notif.title}</p>
                          {notif.unread && (
                            <span className="w-1.5 h-1.5 bg-primary rounded-full shrink-0"></span>
                          )}
                        </div>
                        <p className="text-[11px] text-slate-500 mt-1 leading-normal">{notif.desc}</p>
                        <p className="text-[9px] font-semibold text-slate-400 mt-2">{notif.time}</p>
                      </div>
                    </div>
                  ))}
                </div>

              </aside>
            </>
          )}

          {/* ============ MODAL PORTALS ============ */}
          <AddParticipantModal 
            isOpen={isAddOpen} 
            onClose={() => setIsAddOpen(false)} 
            onAdd={handleAddParticipant} 
          />

          <AssignMentorModal 
            isOpen={isAssignOpen} 
            onClose={() => setIsAssignOpen(false)} 
            onAssign={handleAssignMentor} 
          />

          {/* Render Toast Notifications */}
          {ReactDOM.createPortal(
            <div className="flex flex-col gap-3 pointer-events-none">
              {toasts.map((toast) => (
                <Toast
                  key={toast.id}
                  id={toast.id}
                  type={toast.type}
                  title={toast.title}
                  message={toast.message}
                  onClose={removeToast}
                />
              ))}
            </div>,
            document.getElementById('toast-root')
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
